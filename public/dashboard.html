<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoReel AI Kontrol Merkezi</title>
<style>
:root {
  --cream:#f5f0e8; --warm:#faf8f4; --gold:#c9a84c; --gold-l:#e8d49a;
  --gold-d:#9a7a2e; --coal:#1c1c1c; --mid:#5a5550; --soft:#9a9490;
  --border:#e0d8cc; --bg:#f8f5ef;
  --claude-bg:#e8f0fe; --claude-border:#4285f4;
  --gemini-bg:#e8f5e9; --gemini-border:#34a853;
  --user-bg:#fff8e1; --user-border:#f9a825;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--coal); min-height:100vh; display:flex; flex-direction:column; }

header {
  background:var(--coal); color:var(--cream); padding:14px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo { font-size:20px; font-weight:600; }
.logo span { color:var(--gold); }
.status-badge {
  padding:4px 12px; border-radius:12px; font-size:11px; font-weight:500;
  background:#333; color:#999;
}
.status-badge.running { background:#1b5e20; color:#a5d6a7; }
.status-badge.paused { background:#e65100; color:#ffcc80; }

.controls {
  background:var(--warm); border-bottom:1px solid var(--border);
  padding:12px 20px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.controls input[type=text] {
  flex:1; min-width:200px; padding:10px 14px; border:1px solid var(--border);
  border-radius:8px; font-size:14px; outline:none; background:#fff;
}
.controls input:focus { border-color:var(--gold); }
.btn {
  padding:10px 18px; border:none; border-radius:8px; font-size:13px;
  font-weight:500; cursor:pointer; transition:all .2s;
}
.btn-start { background:var(--coal); color:var(--cream); }
.btn-start:hover { background:#333; }
.btn-stop { background:#c62828; color:#fff; }
.btn-stop:hover { background:#e53935; }
.btn-pause { background:var(--gold); color:#fff; }
.btn-send { background:var(--gold-d); color:#fff; }
.btn-send:hover { background:var(--gold); }

.chat-area {
  flex:1; overflow-y:auto; padding:16px 20px; display:flex;
  flex-direction:column; gap:10px;
}
.msg {
  max-width:85%; padding:12px 16px; border-radius:12px;
  font-size:14px; line-height:1.5; border-left:4px solid;
  word-wrap:break-word; white-space:pre-wrap;
}
.msg.claude { background:var(--claude-bg); border-color:var(--claude-border); align-self:flex-start; }
.msg.gemini { background:var(--gemini-bg); border-color:var(--gemini-border); align-self:flex-end; }
.msg.user { background:var(--user-bg); border-color:var(--user-border); align-self:center; }
.msg.system { background:#f3e5f5; border-color:#9c27b0; align-self:center; font-size:12px; }
.msg-sender {
  font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:1px; margin-bottom:4px; opacity:.7;
}
.msg.claude .msg-sender { color:var(--claude-border); }
.msg.gemini .msg-sender { color:var(--gemini-border); }
.msg.user .msg-sender { color:var(--user-border); }
.msg-time { font-size:10px; color:var(--soft); margin-top:4px; }

.input-bar {
  background:var(--warm); border-top:1px solid var(--border);
  padding:12px 20px; display:flex; gap:10px; align-items:center;
}
.input-bar input {
  flex:1; padding:10px 14px; border:1px solid var(--border);
  border-radius:8px; font-size:14px; outline:none; background:#fff;
}
.input-bar input:focus { border-color:var(--gold); }
.input-bar select {
  padding:10px; border:1px solid var(--border); border-radius:8px;
  font-size:13px; background:#fff;
}

.bottom-nav {
  background:var(--coal); padding:10px 20px; display:flex;
  justify-content:center; gap:20px;
}
.bottom-nav a {
  color:var(--soft); text-decoration:none; font-size:12px;
  padding:6px 14px; border-radius:6px; transition:all .2s;
}
.bottom-nav a:hover, .bottom-nav a.active { color:var(--gold); background:rgba(201,168,76,.1); }

.empty-state {
  flex:1; display:flex; align-items:center; justify-content:center;
  flex-direction:column; color:var(--soft); gap:8px;
}
.empty-state .icon { font-size:48px; }
.empty-state p { font-size:14px; }

@media (max-width:600px) {
  .controls { flex-direction:column; }
  .controls input[type=text] { min-width:auto; }
  .msg { max-width:95%; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Photo<span>Reel</span> AI</div>
  <div class="status-badge" id="statusBadge">Bağlanıyor...</div>
</header>

<div class="controls">
  <input type="text" id="topicInput" placeholder="Konu girin... (ör: PhotoReel için Instagram trend analizi)">
  <button class="btn btn-start" id="btnStart" onclick="startConversation()">Başlat</button>
  <button class="btn btn-pause" id="btnPause" onclick="pauseConversation()" style="display:none">Duraklat</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopConversation()" style="display:none">Durdur</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="icon">🤖</div>
    <p>Claude ve Gemini'yi konuşturmak için bir konu girin</p>
    <p style="font-size:12px">İki AI birbirleriyle tartışacak, siz izleyeceksiniz</p>
  </div>
</div>

<div class="input-bar">
  <select id="targetSelect">
    <option value="both">Her İkisine</option>
    <option value="gemini">Gemini'ye</option>
    <option value="claude">Claude'a</option>
  </select>
  <input type="text" id="msgInput" placeholder="Mesaj yazın..." onkeypress="if(event.key==='Enter')sendMessage()">
  <button class="btn btn-send" onclick="sendMessage()">Gönder</button>
</div>

<div class="bottom-nav">
  <a href="/" class="active">Dashboard</a>
  <a href="/app" target="_blank">PhotoReel App</a>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const chatArea = document.getElementById('chatArea');
const emptyState = document.getElementById('emptyState');
const statusBadge = document.getElementById('statusBadge');
let isRunning = false;

socket.on('connect', () => {
  statusBadge.textContent = 'Bağlı';
  statusBadge.className = 'status-badge';
});

socket.on('disconnect', () => {
  statusBadge.textContent = 'Bağlantı Kesildi';
  statusBadge.className = 'status-badge';
});

socket.on('message', (msg) => {
  addMessage(msg.sender, msg.text, msg.timestamp);
});

socket.on('status', (data) => {
  if (data.state === 'running') {
    statusBadge.textContent = 'Çalışıyor...';
    statusBadge.className = 'status-badge running';
    isRunning = true;
    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnPause').style.display = '';
    document.getElementById('btnStop').style.display = '';
  } else if (data.state === 'paused') {
    statusBadge.textContent = 'Duraklatıldı';
    statusBadge.className = 'status-badge paused';
    document.getElementById('btnPause').textContent = 'Devam Et';
    document.getElementById('btnPause').onclick = resumeConversation;
  } else {
    statusBadge.textContent = 'Hazır';
    statusBadge.className = 'status-badge';
    isRunning = false;
    document.getElementById('btnStart').style.display = '';
    document.getElementById('btnPause').style.display = 'none';
    document.getElementById('btnStop').style.display = 'none';
    document.getElementById('btnPause').textContent = 'Duraklat';
    document.getElementById('btnPause').onclick = pauseConversation;
  }
});

socket.on('error', (data) => {
  addMessage('system', 'Hata: ' + data.message);
});

function addMessage(sender, text, timestamp) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  const time = timestamp ? new Date(timestamp).toLocaleTimeString('tr-TR') : new Date().toLocaleTimeString('tr-TR');
  const names = { claude: 'CLAUDE', gemini: 'GEMINI', user: 'SEN', system: 'SİSTEM' };
  div.innerHTML = `<div class="msg-sender">${names[sender] || sender}</div>${escapeHtml(text)}<div class="msg-time">${time}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function startConversation() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) return alert('Lütfen bir konu girin');
  await fetch('/api/chat/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic, maxTurns: 20 })
  });
}

async function stopConversation() {
  await fetch('/api/chat/stop', { method: 'POST' });
}

async function pauseConversation() {
  await fetch('/api/chat/pause', { method: 'POST' });
}

async function resumeConversation() {
  await fetch('/api/chat/resume', { method: 'POST' });
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const target = document.getElementById('targetSelect').value;
  input.value = '';

  addMessage('user', text);

  if (target === 'gemini') {
    await fetch('/api/chat/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
  } else if (target === 'claude') {
    await fetch('/api/chat/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
  } else {
    await fetch('/api/chat/inject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
  }
}
</script>
</body>
</html>
