<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzaktan Çalışma Paneli</title>
    <meta name="theme-color" content="#0d1117"/>
    <!-- Manifest link will be dynamically generated by JS -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @font-face {
            font-family: 'Consolas';
            src: local('Consolas'); /* Prioritize local Consolas font */
            /* src: url('https://fonts.cdnfonts.com/s/7222/Consolas.woff') format('woff'); /* Fallback example, typically pre-bundled or self-hosted */
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-size: 13px;
        }

        .main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            background-color: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            padding: 8px;
            overflow: hidden;
        }

        .panel:last-child {
            border-right: none;
        }

        #terminal-panel {
            flex-basis: 30%;
            flex-shrink: 0;
            flex-grow: 0;
            font-family: 'Consolas', monospace;
            font-size: 13px;
        }

        #chat-panel {
            flex-basis: 45%;
            flex-shrink: 0;
            flex-grow: 0;
            position: relative;
        }

        #quick-access-panel {
            flex-basis: 25%;
            flex-shrink: 0;
            flex-grow: 0;
        }

        .panel-header {
            font-weight: bold;
            margin-bottom: 8px;
            color: #c9d1d9;
            display: flex;
            align-items: center;
        }

        .panel-header .green-dot {
            width: 8px;
            height: 8px;
            background-color: #3fb950;
            border-radius: 50%;
            margin-left: 6px;
        }

        #terminal-output {
            background-color: #0d1117;
            color: #3fb950;
            flex-grow: 1;
            padding: 8px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border-radius: 4px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
        }

        .terminal-line {
            display: flex;
        }

        .line-number {
            color: #6a737d;
            margin-right: 8px;
            user-select: none;
            text-align: right;
            min-width: 25px;
        }

        #approval-banner {
            background-color: #d29922;
            color: #161b22;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
            margin-bottom: 8px;
            display: none;
        }

        #approval-banner button {
            background-color: #161b22;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }

        #approval-banner button:hover {
            background-color: #30363d;
        }

        #message-area {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 0;
        }

        .chat-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 8px;
            position: relative;
            font-size: 13px;
            word-wrap: break-word;
        }

        .chat-bubble.gemini {
            background-color: #1a3a2a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-bubble.claude {
            background-color: #1a2a3a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-bubble.user {
            background-color: #2d333b;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-bubble-meta {
            font-size: 10px;
            color: #6a737d;
            margin-top: 4px;
        }

        .chat-bubble.user .chat-bubble-meta {
            text-align: right;
        }

        #message-input-container {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #chat-input-wrapper {
            display: flex;
            gap: 8px;
        }

        #chat-input {
            flex-grow: 1;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            font-size: 13px;
        }

        #send-message-btn {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        #send-message-btn:hover {
            background-color: #30363d;
        }

        #chat-toggles {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .toggle-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .toggle-option input[type="radio"] {
            display: none;
        }

        .toggle-option span {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #21262d;
            color: #6a737d;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .toggle-option input[type="radio"]:checked + span {
            background-color: #3fb950;
            color: #fff;
            border-color: #3fb950;
        }
        .toggle-option input[type="radio"]#toggle-claude:checked + span {
            background-color: #58a6ff;
            border-color: #58a6ff;
        }


        .quick-card {
            background-color: #0d1117;
            border: 1px solid #30363d;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .progress-bar-container {
            width: 100%;
            background-color: #2d333b;
            border-radius: 3px;
            height: 6px;
            margin-top: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: #3fb950;
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .progress-bar.orange { background-color: #d29922; }
        .progress-bar.red { background-color: #ff5050; }


        #quick-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 16px;
        }

        .quick-button {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: background-color 0.2s ease;
        }

        .quick-button:hover {
            background-color: #30363d;
        }

        #notifications-list {
            margin-top: 16px;
            border-top: 1px solid #30363d;
            padding-top: 8px;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
        }

        .notification-item {
            margin-bottom: 4px;
            color: #6a737d;
        }

        .bottom-bar {
            height: 32px;
            background-color: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0;
            padding: 0 8px;
        }

        .bottom-bar button {
            background-color: transparent;
            border: none;
            color: #6a737d;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .bottom-bar button.active {
            background-color: #21262d;
            color: #c9d1d9;
        }

        .bottom-bar button:hover:not(.active) {
            background-color: #30363d;
            color: #c9d1d9;
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .bottom-bar {
                display: none;
            }
            .panel {
                display: flex !important;
            }
        }

        .panel.hidden-on-tab {
            display: none;
        }

        /* Tablet dikey mod */
        @media (max-width: 1024px) and (orientation: portrait) {
            .main-container {
                flex-direction: column;
            }
            #terminal-panel {
                flex-basis: 25%;
                border-right: none;
                border-bottom: 1px solid #30363d;
            }
            #chat-panel {
                flex-basis: 50%;
                border-right: none;
                border-bottom: 1px solid #30363d;
            }
            #quick-access-panel {
                flex-basis: 25%;
            }
        }

        /* Tablet yatay mod */
        @media (max-width: 1280px) and (orientation: landscape) {
            #terminal-panel { flex-basis: 25%; }
            #chat-panel { flex-basis: 50%; }
            #quick-access-panel { flex-basis: 25%; }
        }

    </style>
</head>
<body>
    <div class="main-container">
        <div id="terminal-panel" class="panel">
            <div class="panel-header">Terminal <span class="green-dot"></span></div>
            <div id="terminal-output"></div>
        </div>

        <div id="chat-panel" class="panel">
            <div id="approval-banner">
                <span>Kod deploy onay bekliyor</span>
                <div>
                    <button id="approve-btn">Onayla</button>
                    <button id="reject-btn">Reddet</button>
                </div>
            </div>

            <div id="message-area">
                <!-- Chat messages will be dynamically inserted here -->
            </div>

            <div id="message-input-container">
                <div id="chat-input-wrapper">
                    <input type="text" id="chat-input" placeholder="Mesaj gönder...">
                    <button id="send-message-btn">Gönder</button>
                </div>
                <div id="chat-toggles">
                    <label class="toggle-option">
                        <input type="radio" name="chatTarget" id="toggle-gemini" value="gemini" checked>
                        <span>Gemini</span>
                    </label>
                    <label class="toggle-option">
                        <input type="radio" name="chatTarget" id="toggle-claude" value="claude">
                        <span>Claude</span>
                    </label>
                </div>
            </div>
        </div>

        <div id="quick-access-panel" class="panel">
            <div class="panel-header">Hızlı Erişim</div>
            <div id="system-stats">
                <div class="quick-card">
                    CPU: <span id="cpu-usage">--%</span>
                    <div class="progress-bar-container"><div id="cpu-progress" class="progress-bar"></div></div>
                </div>
                <div class="quick-card">
                    RAM: <span id="ram-usage">--/-- GB</span>
                    <div class="progress-bar-container"><div id="ram-progress" class="progress-bar"></div></div>
                </div>
                <div class="quick-card">
                    Disk: <span id="disk-usage">--/-- GB</span>
                    <div class="progress-bar-container"><div id="disk-progress" class="progress-bar"></div></div>
                </div>
                <div class="quick-card">
                    Internet: <span id="internet-status">--</span>
                </div>
            </div>

            <div id="quick-buttons">
                <button class="quick-button" data-command-type="screenshot">Ekran Görüntüsü</button>
                <button class="quick-button" data-command-type="popup_message">Mesaj Gönder</button>
                <button class="quick-button" data-command-type="send_idea">Fikir Gönder</button>
                <button class="quick-button" data-command-type="lock_pc">Kilitle</button>
                <button class="quick-button" data-command-type="restart_pc">Yeniden Başlat</button>
                <button class="quick-button" data-command-type="shutdown_pc">Kapat</button>
            </div>

            <div id="notifications-list">
                <div class="panel-header" style="margin-bottom: 4px;">Son Bildirimler</div>
                <!-- Notifications will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button id="tab-terminal" data-target-panel="terminal-panel">Terminal</button>
        <button id="tab-chat" data-target-panel="chat-panel">Sohbet</button>
        <button id="tab-commands" data-target-panel="quick-access-panel">Komutlar</button>
        <button id="tab-all" data-target-panel="all" class="active">Hepsi</button>
    </div>

    <script>
        const manifestContent = {
            "name": "Uzaktan Çalışma Paneli",
            "short_name": "Remote Panel",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0d1117",
            "theme_color": "#0d1117",
            "icons": [
                {
                    "src": "/icon-192.png",
                    "sizes": "192x192",
                    "type": "image/png"
                },
                {
                    "src": "/icon-512.png",
                    "sizes": "512x512",
                    "type": "image/png"
                }
            ]
        };

        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestContent));
        document.head.appendChild(manifestLink);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }

        const terminalOutput = document.getElementById('terminal-output');
        const messageArea = document.getElementById('message-area');
        const chatInput = document.getElementById('chat-input');
        const sendMessageBtn = document.getElementById('send-message-btn');
        const toggleGemini = document.getElementById('toggle-gemini');
        const toggleClaude = document.getElementById('toggle-claude');
        const approvalBanner = document.getElementById('approval-banner');
        const approveBtn = document.getElementById('approve-btn');
        const rejectBtn = document.getElementById('reject-btn');

        const cpuUsage = document.getElementById('cpu-usage');
        const cpuProgress = document.getElementById('cpu-progress');
        const ramUsage = document.getElementById('ram-usage');
        const ramProgress = document.getElementById('ram-progress');
        const diskUsage = document.getElementById('disk-usage');
        const diskProgress = document.getElementById('disk-progress');
        const internetStatus = document.getElementById('internet-status');
        const quickButtons = document.getElementById('quick-buttons');
        const notificationsList = document.getElementById('notifications-list');

        const bottomBar = document.querySelector('.bottom-bar');
        const panels = document.querySelectorAll('.panel');

        let chatMessages = [];
        let currentApprovalId = null;
        let terminalLineCount = 0;
        let lastClaudeReplyTimestamp = 0;

        const socket = io();

        socket.on('terminal_output', (data) => {
            const lineDiv = document.createElement('div');
            lineDiv.classList.add('terminal-line');
            const lineNumberSpan = document.createElement('span');
            lineNumberSpan.classList.add('line-number');
            terminalLineCount++;
            lineNumberSpan.textContent = terminalLineCount.toString().padStart(3, '0');
            const lineTextSpan = document.createElement('span');
            lineTextSpan.textContent = data.output;
            lineDiv.appendChild(lineNumberSpan);
            lineDiv.appendChild(lineTextSpan);
            terminalOutput.appendChild(lineDiv);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        });

        socket.on('claude_reply', (data) => {
            addMessage('Claude', data.response, 'claude');
            lastClaudeReplyTimestamp = Date.now();
        });

        socket.on('agent_update', (data) => {
            updateSystemStats(data.system_status);
            updateNotifications(data.notifications || []);
        });

        socket.on('approval_request', (data) => {
            approvalBanner.style.display = 'flex';
            currentApprovalId = data.id;
        });

        async function fetchAPI(url, method = 'GET', body = null) {
            try {
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (body) options.body = JSON.stringify(body);
                const response = await fetch(url, options);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(sender, text, type, timestamp = Date.now()) {
            chatMessages.push({ sender, text, type, timestamp });
            renderMessages();
        }

        function renderMessages() {
            messageArea.innerHTML = '';
            chatMessages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.classList.add('chat-bubble', msg.type);
                bubble.innerHTML = `
                    <div>${msg.text}</div>
                    <div class="chat-bubble-meta">${msg.sender} - ${formatTime(msg.timestamp)}</div>
                `;
                messageArea.appendChild(bubble);
            });
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        async function loadChatHistory() {
            const history = await fetchAPI('/api/claude-local/history');
            if (history && history.messages) {
                chatMessages = history.messages.map(msg => ({
                    sender: msg.sender === 'user' ? 'Sen' : 'Claude',
                    text: msg.text,
                    type: msg.sender === 'user' ? 'user' : 'claude',
                    timestamp: new Date(msg.timestamp).getTime()
                }));
                renderMessages();
            }
        }

        async function pollClaudeReplies() {
            const replies = await fetchAPI('/api/claude-local/replies');
            if (replies && replies.length > 0) {
                replies.forEach(reply => {
                    const replyTimestamp = new Date(reply.timestamp).getTime();
                    if (replyTimestamp > lastClaudeReplyTimestamp && !chatMessages.some(m => m.timestamp === replyTimestamp && m.text === reply.response)) {
                        addMessage('Claude', reply.response, 'claude', replyTimestamp);
                        lastClaudeReplyTimestamp = replyTimestamp;
                    }
                });
            }
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage('Sen', text, 'user');
            chatInput.value = '';

            const target = document.querySelector('input[name="chatTarget"]:checked').value;

            if (target === 'gemini') {
                const response = await fetchAPI('/api/chat/gemini', 'POST', { text });
                if (response && response.response) {
                    addMessage('Gemini', response.response, 'gemini');
                }
            } else if (target === 'claude') {
                await fetchAPI('/api/claude-local/send', 'POST', { text });
            }
        }

        sendMessageBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        approveBtn.addEventListener('click', async () => {
            if (currentApprovalId) {
                await fetchAPI(`/api/agent/command/bedrihan-pc`, 'POST', { type: 'approve_deploy', data: { id: currentApprovalId, status: 'approved' } });
                approvalBanner.style.display = 'none';
                currentApprovalId = null;
            }
        });

        rejectBtn.addEventListener('click', async () => {
            if (currentApprovalId) {
                await fetchAPI(`/api/agent/command/bedrihan-pc`, 'POST', { type: 'approve_deploy', data: { id: currentApprovalId, status: 'rejected' } });
                approvalBanner.style.display = 'none';
                currentApprovalId = null;
            }
        });

        function updateProgressBar(element, percentage) {
            element.style.width = `${percentage}%`;
            element.classList.remove('orange', 'red');
            if (percentage > 80) {
                element.classList.add('red');
            } else if (percentage > 60) {
                element.classList.add('orange');
            }
        }

        function updateSystemStats(status) {
            if (!status) return;

            const cpu = status.cpu_usage || 0;
            cpuUsage.textContent = `${cpu.toFixed(1)}%`;
            updateProgressBar(cpuProgress, cpu);

            const ramUsed = (status.ram_used / (1024 ** 3));
            const ramTotal = (status.ram_total / (1024 ** 3));
            const ramPercent = (ramUsed / ramTotal) * 100;
            ramUsage.textContent = `${ramUsed.toFixed(1)}/${ramTotal.toFixed(1)} GB`;
            updateProgressBar(ramProgress, ramPercent);

            const diskUsed = (status.disk_used / (1024 ** 3));
            const diskTotal = (status.disk_total / (1024 ** 3));
            const diskPercent = (diskUsed / diskTotal) * 100;
            diskUsage.textContent = `${diskUsed.toFixed(1)}/${diskTotal.toFixed(1)} GB`;
            updateProgressBar(diskProgress, diskPercent);

            internetStatus.textContent = status.internet_connected ? 'Bağlı' : 'Değil';
            internetStatus.style.color = status.internet_connected ? '#3fb950' : '#ff5050';
        }

        async function pollSystemStatus() {
            const status = await fetchAPI('/api/agent/status/bedrihan-pc');
            if (status) {
                updateSystemStats(status.system_status);
                updateNotifications(status.notifications || []);
            }
        }

        function updateNotifications(notifications) {
            notificationsList.innerHTML = `<div class="panel-header" style="margin-bottom: 4px;">Son Bildirimler</div>`;
            if (notifications.length === 0) {
                const noNotif = document.createElement('div');
                noNotif.classList.add('notification-item');
                noNotif.textContent = 'Henüz bildirim yok.';
                notificationsList.appendChild(noNotif);
            } else {
                notifications.slice(-5).reverse().forEach(notif => {
                    const item = document.createElement('div');
                    item.classList.add('notification-item');
                    item.textContent = `${formatTime(new Date(notif.timestamp).getTime())}: ${notif.message}`;
                    notificationsList.appendChild(item);
                });
            }
        }

        quickButtons.addEventListener('click', async (e) => {
            const button = e.target.closest('.quick-button');
            if (button) {
                const commandType = button.dataset.commandType;
                let commandData = {};

                if (commandType === 'popup_message') {
                    const message = prompt('Bilgisayara göndermek istediğiniz mesajı girin:');
                    if (!message) return;
                    commandData = { message };
                } else if (commandType === 'send_idea') {
                    const idea = prompt('Fikrinizi girin:');
                    if (!idea) return;
                    commandData = { idea };
                }

                await fetchAPI('/api/agent/command/bedrihan-pc', 'POST', { type: commandType, data: commandData });
                alert(`${button.textContent} komutu gönderildi.`);
            }
        });

        bottomBar.addEventListener('click', (e) => {
            const button = e.target.closest('button');
            if (!button) return;

            bottomBar.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            const targetPanelId = button.dataset.targetPanel;

            panels.forEach(panel => panel.classList.add('hidden-on-tab'));

            if (targetPanelId === 'all') {
                panels.forEach(panel => panel.classList.remove('hidden-on-tab'));
            } else {
                const targetPanel = document.getElementById(targetPanelId);
                if (targetPanel) {
                    targetPanel.classList.remove('hidden-on-tab');
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadChatHistory();
            pollSystemStatus();
            setInterval(pollSystemStatus, 10000);
            setInterval(pollClaudeReplies, 3000);

            if (window.matchMedia("(min-width: 768px) and (orientation: landscape)").matches) {
                document.getElementById('tab-all').click();
            } else {
                document.getElementById('tab-chat').click();
            }
        });
    </script>
</body>
</html>
