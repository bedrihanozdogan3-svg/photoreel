<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Kontrol Paneli</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;height:100vh;overflow:hidden}

/* ANA TABLO DÜZENİ - %40 sol, %60 sağ */
table#layout{width:100%;height:100vh;border-collapse:collapse}
td{vertical-align:top}
td#sol{width:40%;height:100vh;position:relative;border-right:2px solid #1f6feb}
td#sag{width:60%;height:100vh;background:#0a0e14;color:#39ff14;font-family:'Cascadia Code',Consolas,'Courier New',monospace;font-size:11px;padding:10px 12px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;letter-spacing:0.3px}

/* SOL İÇERİK */
#sol-ic{display:flex;flex-direction:column;height:100vh}
#baslik{background:linear-gradient(135deg,#161b22,#1c2333);padding:8px 12px;font-weight:700;font-size:13px;border-bottom:1px solid #30363d;flex-shrink:0;display:flex;align-items:center;gap:8px}
#baslik::before{content:'';width:8px;height:8px;border-radius:50%;background:#3fb950;box-shadow:0 0 6px #3fb950}
#mesajlar{flex:1;overflow-y:auto;padding:10px;background:#0d1117}
.balon{margin-bottom:8px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.balon-ic{display:inline-block;padding:8px 12px;border-radius:14px;max-width:85%;font-size:12px;line-height:1.5;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.balon-g .balon-ic{background:linear-gradient(135deg,#1a3a2a,#1e4d35);border-bottom-left-radius:4px}
.balon-c .balon-ic{background:linear-gradient(135deg,#1a2a3a,#1e354d);border-bottom-left-radius:4px}
.balon-u{text-align:right}
.balon-u .balon-ic{background:linear-gradient(135deg,#2d333b,#363e48);border-bottom-right-radius:4px}
.zaman{font-size:9px;color:#555;margin-top:2px;letter-spacing:0.3px}

/* GİRİŞ ALANI */
#giris{background:#161b22;padding:8px;border-top:2px solid #21262d;flex-shrink:0}
#giris-satir{display:flex;gap:6px;margin-bottom:6px;align-items:center}
#giris-satir input{flex:1;background:#0d1117;border:2px solid #30363d;color:#c9d1d9;padding:10px 14px;border-radius:20px;font-size:13px;outline:none;transition:border-color .2s}
#giris-satir input:focus{border-color:#1f6feb;box-shadow:0 0 0 3px rgba(31,111,235,.15)}
button{border:none;border-radius:8px;padding:10px 14px;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all .15s;min-height:36px}
button:active{transform:scale(.95)}
.bg{background:#238636;color:#fff;box-shadow:0 2px 4px rgba(35,134,54,.3)}
.bg.off{background:#21262d;color:#8b949e;box-shadow:none}
.bc{background:#1f6feb;color:#fff;box-shadow:0 2px 4px rgba(31,111,235,.3)}
.bc.off{background:#21262d;color:#8b949e;box-shadow:none}
.bsend{background:#1f6feb;color:#fff;padding:10px 16px;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(31,111,235,.4)}
.bsend:hover{box-shadow:0 4px 12px rgba(31,111,235,.5)}

/* HIZLI KOMUTLAR */
#komutlar{display:flex;gap:4px;flex-wrap:wrap}
#komutlar button{flex:1;min-width:44px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:10px 6px;border-radius:8px;font-size:14px;min-height:40px;transition:all .15s}
#komutlar button:active{background:#30363d;transform:scale(.95)}
#komutlar .onay{background:#238636;color:#fff;border-color:#238636;box-shadow:0 2px 4px rgba(35,134,54,.3)}
#komutlar .red{background:#da3633;color:#fff;border-color:#da3633;box-shadow:0 2px 4px rgba(218,54,51,.3)}

/* TOAST */
.toast-k{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:999}
.toast-m{background:#30363d;color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;margin-bottom:4px;box-shadow:0 4px 12px rgba(0,0,0,.4);animation:fadeIn .3s}
.toast-m.err{background:#da3633}
.toast-m.ok{background:#238636}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
</style>
</head>
<body>

<table id="layout">
<tr>
<td id="sol">
  <div id="sol-ic">
    <div id="baslik">💬 Sohbet</div>
    <div id="mesajlar">
      <div class="balon balon-g"><div class="balon-ic">Merhaba Bedrihan! Gemini burada.</div><div class="zaman">Gemini</div></div>
      <div class="balon balon-c"><div class="balon-ic">Claude da hazır. Yaz bana.</div><div class="zaman">Claude</div></div>
    </div>
    <div id="giris">
      <div id="giris-satir">
        <button class="bg" id="tg" onclick="sec('gemini')">G</button>
        <button class="bc off" id="tc" onclick="sec('claude')">C</button>
        <input type="text" id="inp" placeholder="Mesaj yaz..." enterkeyhint="send">
        <button class="bsend" onclick="gonder()">➤</button>
      </div>
      <div id="komutlar">
        <button onclick="komut('screenshot')">📸</button>
        <button onclick="komut('message')">💬</button>
        <button onclick="komut('fikir')">💡</button>
        <button onclick="komut('lock')">🔒</button>
        <button class="onay" onclick="onayla(true)">✅</button>
        <button class="red" onclick="onayla(false)">❌</button>
      </div>
    </div>
  </div>
</td>
<td id="sag">$ Terminal başlatıldı...
</td>
</tr>
</table>

<div class="toast-k" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
var model='gemini',mesajlar=document.getElementById('mesajlar'),inp=document.getElementById('inp'),sag=document.getElementById('sag');

function sec(m){model=m;document.getElementById('tg').className='bg'+(m==='gemini'?'':' off');document.getElementById('tc').className='bc'+(m==='claude'?'':' off');bildir(m==='gemini'?'Gemini seçildi':'Claude seçildi')}

function ekle(t,tip){var d=document.createElement('div');d.className='balon balon-'+tip;d.innerHTML='<div class="balon-ic">'+esc(t)+'</div><div class="zaman">'+(tip==='g'?'Gemini':tip==='c'?'Claude':'Sen')+' - '+saat()+'</div>';mesajlar.appendChild(d);mesajlar.scrollTop=mesajlar.scrollHeight}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function saat(){var n=new Date();return ('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2)}

function gonder(){var t=inp.value.trim();if(!t)return;inp.value='';ekle(t,'u');
if(model==='gemini'){ft('/api/chat/gemini','POST',{text:t}).then(function(r){if(r&&r.response)ekle(r.response,'g');else bildir('Gemini hatası','err')}).catch(function(e){bildir('Hata: '+e.message,'err')})}
else{ft('/api/claude-local/send','POST',{text:t}).then(function(){bildir('Claude mesajı gönderildi')}).catch(function(e){bildir('Hata: '+e.message,'err')})}}

inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();gonder()}});

function komut(tip){
if(tip==='message'){var t=prompt('Mesaj:');if(t)ft('/api/agent/command/bedrihan-pc','POST',{type:'message',data:t}).then(function(){bildir('Gönderildi','ok')})}
else if(tip==='fikir'){var t=prompt('Fikir:');if(t)ft('/api/chat/gemini','POST',{text:'/fikir '+t}).then(function(){bildir('Kaydedildi','ok')})}
else{ft('/api/agent/command/bedrihan-pc','POST',{type:tip,data:''}).then(function(){bildir('Gönderildi','ok')})}}

function onayla(ok){ft('/api/agent/command/bedrihan-pc','POST',{type:'approval',data:ok?'approved':'rejected'}).then(function(){bildir(ok?'Onaylandı ✅':'Reddedildi ❌',ok?'ok':'err')})}

function ft(url,method,body){var fullUrl=window.location.origin+url;return fetch(fullUrl,{method:method||'GET',headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):null}).then(function(r){return r.json()})}

function bildir(msg,tip){var c=document.getElementById('toast'),d=document.createElement('div');d.className='toast-m '+(tip||'');d.textContent=msg;c.appendChild(d);setTimeout(function(){d.remove()},2500)}

// Claude cevap polling
setInterval(function(){fetch(window.location.origin+'/api/claude-local/replies').then(function(r){return r.json()}).then(function(d){if(d.replies&&d.replies.length)d.replies.forEach(function(r){ekle(r.text,'c')})}).catch(function(){})},3000);

// Socket.io
try{var socket=io();socket.on('claude_reply',function(d){if(d.text)ekle(d.text,'c')});socket.on('terminal_output',function(d){if(d){sag.textContent+=d+'\n';sag.scrollTop=sag.scrollHeight}})}catch(e){}
</script>
</body>
</html>
