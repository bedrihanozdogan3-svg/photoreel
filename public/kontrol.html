<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Kontrol Paneli</title>
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;overflow:hidden;background:#0d1117;color:#c9d1d9;font:11px -apple-system,sans-serif}
#app{display:flex;height:100vh;width:100vw}

/* SOL - SOHBET %50 */
#chat{width:50%;display:flex;flex-direction:column;border-right:1px solid #30363d}
#chat-header{height:28px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 8px;font-weight:600;font-size:11px;gap:8px}
#chat-header .dot{width:6px;height:6px;border-radius:50%;background:#3fb950}
#msgs{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px}
.msg{max-width:80%;padding:5px 8px;border-radius:10px;font-size:11px;line-height:1.3;word-wrap:break-word}
.msg.g{background:#1a3a2a;align-self:flex-start;border-bottom-left-radius:2px}
.msg.c{background:#1a2a3a;align-self:flex-start;border-bottom-left-radius:2px}
.msg.u{background:#2d333b;align-self:flex-end;border-bottom-right-radius:2px}
.meta{font-size:8px;color:#666;margin-top:1px}
.meta.r{text-align:right}
#input-area{border-top:1px solid #30363d;padding:4px;display:flex;gap:4px;align-items:center;background:#161b22}
#input-area input{flex:1;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px 8px;border-radius:14px;font-size:11px;outline:none}
#input-area input:focus{border-color:#1f6feb}
.btn{border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:600}
.btn-send{background:#1f6feb;color:#fff}
.btn-g{background:#238636;color:#fff}
.btn-g.off{background:#21262d;color:#8b949e}
.btn-c{background:#1f6feb;color:#fff}
.btn-c.off{background:#21262d;color:#8b949e}

/* SAĞ - TERMİNAL + KOMUTLAR %50 */
#right{width:50%;display:flex;flex-direction:column}

/* Terminal üst yarı */
#term{flex:1;background:#000;color:#0f0;font:10px Consolas,monospace;padding:6px;overflow-y:auto;border-bottom:1px solid #30363d;white-space:pre-wrap;line-height:1.3}

/* Komutlar alt yarı */
#cmds{height:auto;max-height:45%;padding:6px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;background:#161b22}
#cmds h3{font-size:10px;color:#8b949e;margin-bottom:2px}
.cmd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.cmd-btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:7px 4px;border-radius:4px;cursor:pointer;font-size:9px;text-align:center}
.cmd-btn:active{background:#30363d}
#approval{display:flex;gap:4px;margin-top:3px}
#approval .btn-ok{flex:1;background:#238636;color:#fff;padding:8px;border:none;border-radius:4px;cursor:pointer;font-size:10px;font-weight:600}
#approval .btn-no{flex:1;background:#da3633;color:#fff;padding:8px;border:none;border-radius:4px;cursor:pointer;font-size:10px;font-weight:600}

/* Toast */
#toast{position:fixed;top:8px;right:8px;z-index:99}
.toast{background:#30363d;color:#c9d1d9;padding:6px 10px;border-radius:4px;font-size:10px;margin-bottom:4px;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast.err{background:#da3633}
.toast.ok{background:#238636}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <!-- SOL: SOHBET -->
  <div id="chat">
    <div id="chat-header"><span class="dot"></span>Sohbet</div>
    <div id="msgs"></div>
    <div id="input-area">
      <button class="btn btn-g" id="tg" onclick="setModel('gemini')">G</button>
      <button class="btn btn-c off" id="tc" onclick="setModel('claude')">C</button>
      <input id="inp" placeholder="Mesaj yaz..." onkeydown="if(event.key==='Enter')send()">
      <button class="btn btn-send" onclick="send()">➤</button>
    </div>
    <div style="display:flex;gap:3px;padding:3px 4px;background:#161b22;border-top:1px solid #30363d;flex-wrap:wrap">
      <div class="cmd-btn" onclick="cmd('screenshot')" style="flex:1;min-width:50px">📸</div>
      <div class="cmd-btn" onclick="cmd('message')" style="flex:1;min-width:50px">💬</div>
      <div class="cmd-btn" onclick="cmd('fikir')" style="flex:1;min-width:50px">💡</div>
      <div class="cmd-btn" onclick="cmd('lock')" style="flex:1;min-width:50px">🔒</div>
      <div class="cmd-btn" onclick="approve(true)" style="flex:1;min-width:50px;background:#238636;color:#fff">✅</div>
      <div class="cmd-btn" onclick="approve(false)" style="flex:1;min-width:50px;background:#da3633;color:#fff">❌</div>
    </div>
  </div>

  <!-- SAĞ: TERMİNAL + KOMUTLAR -->
  <div id="right">
    <div id="term">$ Terminal başlatıldı...\n</div>
    <!-- Komutlar sohbet altına taşındı -->
  </div>
</div>
<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
let model='gemini';
const msgs=document.getElementById('msgs');
const inp=document.getElementById('inp');
const term=document.getElementById('term');

function setModel(m){
  model=m;
  document.getElementById('tg').className='btn btn-g'+(m==='gemini'?'':' off');
  document.getElementById('tc').className='btn btn-c'+(m==='claude'?'':' off');
  toast(m==='gemini'?'Gemini seçildi':'Claude seçildi');
}

function addMsg(text,type){
  const d=document.createElement('div');
  d.innerHTML='<div class="msg '+type+'">'+esc(text)+'</div><div class="meta'+(type==='u'?' r':'')+'">'+
    (type==='g'?'Gemini':type==='c'?'Claude':'Sen')+' - '+time()+'</div>';
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function time(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')}

async function send(){
  const t=inp.value.trim();if(!t)return;
  inp.value='';
  addMsg(t,'u');
  try{
    if(model==='gemini'){
      const r=await ft('/api/chat/gemini','POST',{text:t});
      if(r&&r.response)addMsg(r.response,'g');
      else if(r&&r.ok===false)throw new Error(r.error||'Hata');
    }else{
      await ft('/api/claude-local/send','POST',{text:t});
      toast('Claude mesajı gönderildi, yanıt bekleniyor...');
    }
  }catch(e){toast('Hata: '+e.message,'err')}
}

async function cmd(type){
  if(type==='message'){
    const t=prompt('Bilgisayara mesaj:');if(!t)return;
    await ft('/api/agent/command/bedrihan-pc','POST',{type:'message',data:t});
    toast('Mesaj gönderildi');
  }else if(type==='fikir'){
    const t=prompt('Fikrin:');if(!t)return;
    await ft('/api/chat/gemini','POST',{text:'/fikir '+t});
    toast('Fikir kaydedildi');
  }else if(type==='restart'||type==='shutdown'){
    if(!confirm(type==='restart'?'Yeniden başlatılsın mı?':'Kapatılsın mı?'))return;
    await ft('/api/agent/command/bedrihan-pc','POST',{type,data:''});
    toast('Komut gönderildi');
  }else{
    await ft('/api/agent/command/bedrihan-pc','POST',{type,data:''});
    toast('Komut gönderildi');
  }
}

async function approve(ok){
  await ft('/api/agent/command/bedrihan-pc','POST',{type:'approval',data:ok?'approved':'rejected'});
  toast(ok?'Onaylandı ✅':'Reddedildi ❌',ok?'ok':'err');
}

async function ft(url,method='GET',body=null){
  const opt={method,headers:{'Content-Type':'application/json'}};
  if(body)opt.body=JSON.stringify(body);
  for(let i=0;i<3;i++){
    try{
      const r=await fetch(url,opt);
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||r.statusText);
      return d;
    }catch(e){
      if(i<2){await new Promise(r=>setTimeout(r,1000*(i+1)));continue}
      throw e;
    }
  }
}

function toast(msg,type=''){
  const c=document.getElementById('toast');
  const t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;
  c.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},2500);
}

// Claude cevap polling
setInterval(async()=>{
  try{
    const r=await fetch('/api/claude-local/replies');
    const d=await r.json();
    if(d.replies&&d.replies.length>0){
      d.replies.forEach(reply=>{addMsg(reply.text,'c');toast('Claude yanıt verdi!')});
    }
  }catch(e){}
},3000);

// Socket.io
try{
  const socket=io();
  socket.on('claude_reply',d=>{if(d.text)addMsg(d.text,'c')});
  socket.on('terminal_output',d=>{if(d)term.textContent+=d+'\n';term.scrollTop=term.scrollHeight});
  socket.on('connect',()=>toast('Bağlandı','ok'));
  socket.on('disconnect',()=>toast('Bağlantı kesildi','err'));
}catch(e){}

// PWA
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
