<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,interactive-widget=resizes-content">
<meta name="mobile-web-app-capable" content="yes">
<title>Kontrol Paneli</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}

table#layout{width:100%;height:100%;border-collapse:collapse;table-layout:fixed}
td{vertical-align:top;overflow:hidden}
td#sol{width:40%;border-right:2px solid #1f6feb}
td#sag-td{width:60%;background:#0a0e14}

/* SOL */
#sol-ic{display:flex;flex-direction:column;height:100vh;height:100dvh}
#baslik{background:#161b22;padding:8px 12px;font-weight:700;font-size:14px;border-bottom:1px solid #30363d;flex-shrink:0;display:flex;align-items:center;gap:6px}
#baslik::before{content:'';width:7px;height:7px;border-radius:50%;background:#3fb950;box-shadow:0 0 6px #3fb950}
#mesajlar{flex:1;overflow-y:auto;padding:8px;min-height:0}
.balon{margin-bottom:6px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.balon-ic{display:inline-block;padding:8px 12px;border-radius:12px;max-width:85%;font-size:14px;line-height:1.4;box-shadow:0 1px 2px rgba(0,0,0,.3);word-break:break-word}
.balon-g .balon-ic{background:linear-gradient(135deg,#1a3a2a,#1e4d35);border-bottom-left-radius:3px}
.balon-c .balon-ic{background:linear-gradient(135deg,#1a2a3a,#1e354d);border-bottom-left-radius:3px}
.balon-u{text-align:right}
.balon-u .balon-ic{background:linear-gradient(135deg,#2d333b,#363e48);border-bottom-right-radius:3px}
.zaman{font-size:10px;color:#555;margin-top:1px}

/* GİRİŞ */
#giris{background:#161b22;padding:5px;border-top:1px solid #30363d;flex-shrink:0}
#komutlar{display:flex;gap:2px;margin-bottom:3px}
#komutlar button{flex:1;background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:5px 2px;border-radius:6px;font-size:12px;min-height:30px}
#komutlar button:active{background:#30363d}
#komutlar .onay{background:#238636;color:#fff;border-color:#238636}
#komutlar .red{background:#da3633;color:#fff;border-color:#da3633}
#giris-satir{display:flex;gap:3px;align-items:center}
#giris-satir input{flex:1;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:8px 10px;border-radius:14px;font-size:14px;outline:none}
#giris-satir input:focus{border-color:#1f6feb}
button{border:none;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation}
button:active{transform:scale(.95)}
.bg{background:#238636;color:#fff}
.bg.off{background:#21262d;color:#8b949e}
.bc{background:#1f6feb;color:#fff}
.bc.off{background:#21262d;color:#8b949e}
.bsend{background:#1f6feb;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px}

/* TERMINAL */
#sag{height:100vh;height:100dvh;overflow-y:auto;overflow-x:hidden;padding:0}
.t-line{padding:2px 6px 2px 36px;position:relative;color:#39ff14;border-bottom:1px solid rgba(57,255,20,.04);animation:typeFade .3s ease;word-wrap:break-word;word-break:break-all;white-space:pre-wrap;font-family:Consolas,monospace;font-size:11px;line-height:1.5}
.t-line:hover{background:rgba(57,255,20,.06)}
.t-line .ln{position:absolute;left:0;width:30px;text-align:right;color:#2a5a1a;font-size:9px;padding-right:4px;border-right:1px solid #1a3a1a}
.t-line .code{color:#39ff14}
.t-line .code .kw{color:#ff7b72}
.t-line .code .str{color:#a5d6ff}
.t-line .code .fn{color:#d2a8ff}
.t-line .code .cm{color:#8b949e;font-style:italic}
.t-line .code .num{color:#79c0ff}
.t-line .code .em{color:#ffa657}
@keyframes typeFade{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}

/* ONAY POPUP */
#onay-popup{position:fixed;top:0;left:0;right:0;background:#f59e0b;color:#000;padding:8px 12px;z-index:999;display:none;align-items:center;justify-content:space-between;font-weight:bold;font-size:13px}
#onay-popup button{margin:0 3px;padding:6px 12px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:12px}

/* TOAST */
.toast-k{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:999}
.toast-m{background:#30363d;color:#fff;padding:8px 16px;border-radius:6px;font-size:11px;margin-bottom:3px;box-shadow:0 4px 8px rgba(0,0,0,.4);animation:fadeIn .3s}
.toast-m.err{background:#da3633}
.toast-m.ok{background:#238636}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
</style>
</head>
<body>

<div id="onay-popup">
  <span id="onay-text">🔔 Onay bekleniyor</span>
  <span>
    <button onclick="onayla(true)" style="background:#238636;color:#fff">✅ Onayla</button>
    <button onclick="onayla(false)" style="background:#da3633;color:#fff">❌ Reddet</button>
  </span>
</div>

<table id="layout">
<tr>
<td id="sol">
  <div id="sol-ic">
    <div id="baslik">💬 Sohbet</div>
    <div id="mesajlar">
      <div class="balon balon-g"><div class="balon-ic">Merhaba Bedrihan! Gemini burada.</div><div class="zaman">Gemini</div></div>
      <div class="balon balon-c"><div class="balon-ic">Claude da hazır. Yaz bana.</div><div class="zaman">Claude</div></div>
    </div>
    <div id="giris">
      <div id="komutlar">
        <button onclick="komut('screenshot')">📸</button>
        <button onclick="komut('message')">💬</button>
        <button onclick="komut('fikir')">💡</button>
        <button onclick="komut('lock')">🔒</button>
        <button class="onay" onclick="onayla(true)">✅</button>
        <button class="red" onclick="onayla(false)">❌</button>
      </div>
      <div id="giris-satir">
        <button class="bg" id="tg" onclick="sec('gemini')">G</button>
        <button class="bc off" id="tc" onclick="sec('claude')">C</button>
        <input type="text" id="inp" placeholder="Mesaj yaz..." enterkeyhint="send">
        <button class="bsend" onclick="gonder()">➤</button>
      </div>
    </div>
  </div>
</td>
<td id="sag-td"><div id="sag"></div></td>
</tr>
</table>

<div class="toast-k" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
var model='gemini',mesajlar=document.getElementById('mesajlar'),inp=document.getElementById('inp'),sag=document.getElementById('sag');
var seenClaudeIds={};
var seenTermLines={};
var userScrolledTerm=false;

function sec(m){model=m;document.getElementById('tg').className='bg'+(m==='gemini'?'':' off');document.getElementById('tc').className='bc'+(m==='claude'?'':' off');bildir(m==='gemini'?'Gemini seçildi':'Claude seçildi')}

function ekle(t,tip,id){
  if(tip==='c'&&id){if(seenClaudeIds[id])return;seenClaudeIds[id]=true}
  var d=document.createElement('div');d.className='balon balon-'+tip;d.innerHTML='<div class="balon-ic">'+esc(t)+'</div><div class="zaman">'+(tip==='g'?'Gemini':tip==='c'?'Claude':'Sen')+' - '+saat()+'</div>';mesajlar.appendChild(d);mesajlar.scrollTop=mesajlar.scrollHeight;
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function saat(){var n=new Date();return ('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2)}

function gonder(){var t=inp.value.trim();if(!t)return;inp.value='';ekle(t,'u');
if(model==='gemini'){ft('/api/chat/gemini','POST',{text:t}).then(function(r){if(r&&r.response)ekle(r.response,'g');else bildir('Gemini hatası','err')}).catch(function(e){bildir('Hata: '+e.message,'err')})}
else{ft('/api/claude-local/send','POST',{text:t}).then(function(){bildir('Claude mesajı gönderildi')}).catch(function(e){bildir('Hata: '+e.message,'err')})}}

inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();gonder()}});

// Klavye beyaz ekran fix
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',function(){
    document.getElementById('sol-ic').style.height=window.visualViewport.height+'px';
    document.getElementById('sag').style.height=window.visualViewport.height+'px';
  });
}

// Terminal scroll - kullanıcı yukarı kaydırırsa otomatik scroll durur
sag.addEventListener('scroll',function(){
  var atBottom=sag.scrollHeight-sag.scrollTop-sag.clientHeight<50;
  userScrolledTerm=!atBottom;
});

function komut(tip){
if(tip==='message'){var t=prompt('Mesaj:');if(t)ft('/api/agent/command/bedrihan-pc','POST',{type:'message',data:t}).then(function(){bildir('Gönderildi','ok')})}
else if(tip==='fikir'){var t=prompt('Fikir:');if(t)ft('/api/chat/gemini','POST',{text:'/fikir '+t}).then(function(){bildir('Kaydedildi','ok')})}
else{ft('/api/agent/command/bedrihan-pc','POST',{type:tip,data:''}).then(function(){bildir('Gönderildi','ok')})}}

function onayla(ok){
  if(window._pendingApprovalId){
    ft('/api/approval/respond/'+window._pendingApprovalId,'POST',{decision:ok?'approved':'rejected'}).then(function(){
      bildir(ok?'Onaylandı ✅':'Reddedildi ❌',ok?'ok':'err');
      window._pendingApprovalId=null;
      document.getElementById('onay-popup').style.display='none';
    });
  } else {
    ft('/api/agent/command/bedrihan-pc','POST',{type:'approval',data:ok?'approved':'rejected'}).then(function(){bildir(ok?'Onaylandı ✅':'Reddedildi ❌',ok?'ok':'err')});
  }
}

function ft(url,method,body){var u=window.location.origin+url;return fetch(u,{method:method||'GET',headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):null}).then(function(r){return r.json()})}

function bildir(msg,tip){var c=document.getElementById('toast'),d=document.createElement('div');d.className='toast-m '+(tip||'');d.textContent=msg;c.appendChild(d);setTimeout(function(){d.remove()},2500)}

// CLAUDE CEVAP - SSE + polling hybrid (mesaj asla kaçmaz)
var lastReplyId='0';

// SSE stream - gerçek zamanlı
function startSSE(){
  try{
    var es=new EventSource(window.location.origin+'/api/claude-local/stream');
    es.onmessage=function(e){
      try{
        var d=JSON.parse(e.data);
        if(d.type==='reply'&&d.id&&!seenClaudeIds[d.id]){
          seenClaudeIds[d.id]=true;
          if(d.id>lastReplyId)lastReplyId=d.id;
          ekle(d.text,'c',d.id);
          if(navigator.vibrate)navigator.vibrate(100);
        }
      }catch(ex){}
    };
    es.onerror=function(){es.close();setTimeout(startSSE,3000)};
    bildir('SSE baglandi','ok');
  }catch(ex){bildir('SSE hata','err')}
}
startSSE();

// Polling yedek - SSE kaçırırsa yakalar
setInterval(function(){
  fetch(window.location.origin+'/api/claude-local/replies?since='+lastReplyId).then(function(r){return r.json()}).then(function(d){
    if(d.replies&&d.replies.length){
      d.replies.forEach(function(r){
        if(!seenClaudeIds[r.id]){seenClaudeIds[r.id]=true;ekle(r.text,'c',r.id)}
        if(r.id>lastReplyId)lastReplyId=r.id;
      });
    }
  }).catch(function(){});
},5000);

// TERMINAL - gelişmiş syntax highlight
var lineNum=0,termSince=0;
function highlightCode(text){
  var h=esc(text);
  // Keyword highlight
  h=h.replace(/\b(function|const|let|var|if|else|return|async|await|try|catch|for|while|import|export|class|new|this|typeof|instanceof|throw|switch|case|break|continue|default|yield|from|of|in|do|void|delete|with|finally|super|extends|static|get|set)\b/g,'<span class="kw">$1</span>');
  // String highlight (double, single, backtick)
  h=h.replace(/(&quot;[^&]*&quot;|&#39;[^&]*&#39;|`[^`]*`)/g,'<span class="str">$1</span>');
  // Number highlight
  h=h.replace(/\b(\d+\.?\d*)\b/g,'<span class="num">$1</span>');
  // Comment highlight
  h=h.replace(/(\/\/.*)/g,'<span class="cm">$1</span>');
  // Function call highlight
  h=h.replace(/(\w+)\(/g,'<span class="fn">$1</span>(');
  // Operator highlight
  h=h.replace(/(=&gt;|===|!==|==|!=|&amp;&amp;|\|\||&lt;=|&gt;=)/g,'<span class="em">$1</span>');
  // Emoji/special
  h=h.replace(/([\u{1F300}-\u{1F9FF}]|---|\*\*\*)/gu,'<span class="em">$1</span>');
  // Boolean/null
  h=h.replace(/\b(true|false|null|undefined|NaN|Infinity)\b/g,'<span class="num">$1</span>');
  return h;
}

function addTermLine(text,id){
  if(id&&seenTermLines[id])return;
  if(id)seenTermLines[id]=true;
  lineNum++;
  var div=document.createElement('div');div.className='t-line';
  var ln=document.createElement('span');ln.className='ln';ln.textContent=lineNum;
  var code=document.createElement('span');code.className='code';
  code.innerHTML=highlightCode(text);
  div.appendChild(ln);div.appendChild(code);
  sag.appendChild(div);
  while(sag.children.length>300)sag.removeChild(sag.firstChild);
  // Kullanıcı yukarı kaydırmadıysa otomatik aşağı
  if(!userScrolledTerm){sag.scrollTop=sag.scrollHeight}
}

// Terminal polling
setInterval(function(){
  ft('/api/terminal/lines?since='+termSince).then(function(d){
    if(d.lines&&d.lines.length>0){
      d.lines.forEach(function(l,i){addTermLine(l.text,termSince+i)});
      termSince=d.total;
    }
  }).catch(function(){});
},2000);

// ONAY polling - daha sık (2sn)
setInterval(function(){
  ft('/api/approval/pending').then(function(d){
    if(d.approvals&&d.approvals.length>0){
      var a=d.approvals[0];
      if(window._pendingApprovalId!==a.id){
        window._pendingApprovalId=a.id;
        document.getElementById('onay-text').textContent='🔔 '+a.title+': '+(a.description||'');
        document.getElementById('onay-popup').style.display='flex';
        bildir('Onay isteği: '+a.title);
        // Titreşim (mobil)
        if(navigator.vibrate)navigator.vibrate([200,100,200]);
      }
    }
  }).catch(function(){});
},2000);

// Socket.io - ID bazlı duplicate engeli
try{
  var socket=io({reconnection:true,reconnectionAttempts:Infinity,reconnectionDelay:1000});
  socket.on('connect',function(){bildir('Socket bağlandı','ok')});
  socket.on('disconnect',function(){bildir('Socket koptu, yeniden bağlanıyor...','err')});
  socket.on('claude_reply',function(d){if(d&&d.id&&!seenClaudeIds[d.id]){seenClaudeIds[d.id]=true;ekle(d.text,'c',d.id)}});
  socket.on('terminal_output',function(d){if(d)addTermLine(d)});
  socket.on('approval_request',function(d){
    window._pendingApprovalId=d.id;
    document.getElementById('onay-text').textContent='🔔 '+d.title+': '+(d.description||'');
    document.getElementById('onay-popup').style.display='flex';
    bildir('🔔 ONAY: '+d.title);
    if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
  });
}catch(e){}
</script>
</body>
</html>
