<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fenix AI — QR Kod</title>
<meta name="theme-color" content="#080507">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080507;color:#F0E6D3;
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.card{
  background:rgba(12,9,6,0.9);
  border:1px solid rgba(255,107,26,0.25);
  border-radius:16px;padding:40px 36px;
  text-align:center;max-width:380px;width:100%;
  box-shadow:0 0 60px rgba(255,69,0,0.08);
}
.logo{
  font-family:Georgia,serif;font-size:28px;font-weight:900;
  letter-spacing:8px;color:#D4A853;
  text-shadow:0 0 30px rgba(255,106,0,0.5);margin-bottom:4px;
}
.tagline{font-size:10px;letter-spacing:3px;color:rgba(196,168,130,0.4);margin-bottom:32px}
.qr-wrap{
  background:#fff;border-radius:12px;padding:16px;
  display:inline-block;margin-bottom:24px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.qr-wrap img{display:block;width:220px;height:220px}
.url-box{
  background:rgba(255,107,26,0.06);border:1px solid rgba(255,107,26,0.15);
  border-radius:8px;padding:10px 14px;font-size:11px;
  color:rgba(196,168,130,0.7);word-break:break-all;margin-bottom:20px;
  letter-spacing:.5px;
}
.free-tag{
  display:inline-block;background:rgba(255,69,0,0.1);
  border:1px solid rgba(255,106,0,0.2);border-radius:20px;
  padding:6px 16px;font-size:11px;letter-spacing:2px;
  color:rgba(255,150,0,0.8);margin-bottom:20px;
}
.steps{text-align:left;margin-bottom:24px}
.step{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.step-num{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  background:rgba(255,107,26,0.2);border:1px solid rgba(255,107,26,0.3);
  font-size:10px;font-weight:700;color:rgba(255,150,0,0.8);
  display:flex;align-items:center;justify-content:center;
}
.step-txt{font-size:12px;color:rgba(196,168,130,0.7);line-height:1.5;padding-top:2px}
.step-txt strong{color:#E8DDD5}
.btn-open{
  display:block;width:100%;padding:14px;
  background:linear-gradient(135deg,rgba(255,69,0,0.2),rgba(255,106,0,0.1));
  border:1px solid rgba(255,106,0,0.3);border-radius:8px;
  font-size:12px;letter-spacing:3px;color:rgba(255,150,0,0.9);
  font-family:Georgia,serif;font-weight:700;text-decoration:none;transition:all .2s;
}
.btn-open:hover{background:rgba(255,69,0,0.25);border-color:rgba(255,106,0,0.5)}
.footer{margin-top:16px;font-size:10px;color:rgba(196,168,130,0.25);letter-spacing:1px}
@media print{
  body{background:#fff}
  .card{border-color:#ddd;box-shadow:none;background:#fff}
  .logo,.tagline,.url-box,.free-tag,.step-txt,.footer{color:#333!important}
  .btn-open{display:none}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">FENİX</div>
  <div class="tagline">AI ÜRÜN VİDEO STÜDYOSU</div>
  <div class="qr-wrap">
    <img id="qr-img" src="" alt="QR Kod" width="220" height="220">
  </div>
  <div class="free-tag">🔥 İLK 5 VİDEO ÜCRETSİZ</div>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-txt"><strong>QR kodu tara</strong> — telefon kameranla</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-txt"><strong>Ürün fotoğrafını yükle</strong> — galeriden veya kameradan</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-txt"><strong>30 saniyede</strong> profesyonel Reels videonu al</div>
    </div>
  </div>
  <div class="url-box" id="url-box">fenixphotoai.com/app</div>
  <a class="btn-open" href="/app">UYGULAMAYI AÇ →</a>
  <div class="footer">fenixphotoai.com · Fenix AI ile üretildi</div>
</div>
<script>
var appUrl = 'https://fenixphotoai.com/app';
// Geliştirme ortamında gerçek URL kullan
if (window.location.hostname !== 'fenixphotoai.com') {
  appUrl = window.location.origin + '/app';
}
document.getElementById('url-box').textContent = appUrl;
document.getElementById('qr-img').src =
  'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='
  + encodeURIComponent(appUrl)
  + '&bgcolor=ffffff&color=080507&margin=0&format=png';
</script>
</body>
</html>
