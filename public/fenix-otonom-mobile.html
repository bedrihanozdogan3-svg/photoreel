<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>Fenix Otonom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0A;
  --surface: #111111;
  --surface2: #161616;
  --border: #1a1a1a;
  --border2: #222222;
  --text: #ffffff;
  --text2: #cccccc;
  --text3: #888888;
  --text4: #555555;
  --text5: #333333;
  --orange: #F97316;
  --orange2: #EA580C;
  --blue: #3B82F6;
  --blue2: #2563EB;
  --purple: #8B5CF6;
  --purple2: #7C3AED;
  --green: #10B981;
  --green2: #059669;
  --yellow: #EAB308;
  --yellow2: #CA8A04;
  --red: #EF4444;
  --pink: #EC4899;
  --pink2: #DB2777;
  --cyan: #06B6D4;
  --cyan2: #0891B2;
  --master-green: #22C55E;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, 'SF Pro Display', system-ui, sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  padding: env(safe-area-inset-top, 16px) 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(180deg, #111 0%, transparent 100%);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: 0 3px 12px rgba(249,115,22,0.3);
}
.logo-text { font-weight: 900; font-size: 15px; letter-spacing: 3px; line-height: 1; }
.logo-sub { font-size: 8px; color: var(--text4); letter-spacing: 2px; margin-top: 1px; }

.header-right { display: flex; align-items: center; gap: 8px; }
.credit-badge {
  background: linear-gradient(135deg, #151515, #111);
  border-radius: 24px;
  padding: 6px 14px;
  display: flex; align-items: center; gap: 6px;
  border: 1px solid var(--border2);
}
.credit-badge.low {
  background: linear-gradient(135deg, #1a0000, #2a0000);
  border-color: #7F1D1D;
  box-shadow: 0 0 12px rgba(239,68,68,0.15);
}
.credit-num { font-size: 16px; font-weight: 900; color: var(--orange); }
.credit-badge.low .credit-num { color: var(--red); }

.jobs-btn {
  background: linear-gradient(135deg, #151515, #111);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 6px 12px;
  font-size: 12px; font-weight: 700;
  color: var(--text4);
  cursor: pointer;
  position: relative;
  font-family: inherit;
}
.jobs-btn.active {
  background: linear-gradient(135deg, #0a1a0a, #0f2a0f);
  border-color: #166534;
  color: var(--master-green);
  box-shadow: 0 0 12px rgba(34,197,94,0.15);
}
.jobs-btn .badge {
  position: absolute; top: -5px; right: -5px;
  background: linear-gradient(135deg, #22C55E, #16A34A);
  border-radius: 50%;
  width: 16px; height: 16px;
  font-size: 9px; font-weight: 900; color: #000;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(34,197,94,0.3);
}

/* ── STATUS BADGES ── */
.status-badge {
  margin: 6px 16px 0;
  border-radius: 14px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.status-badge.master {
  background: linear-gradient(135deg, #071a07, #0a200a);
  border: 1px solid rgba(34,197,94,0.13);
}
.status-badge.trial {
  background: linear-gradient(135deg, #1a1200, #1a0e00);
  border: 1px solid rgba(249,115,22,0.13);
}
.status-icon {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.status-badge.master .status-icon { background: linear-gradient(135deg, rgba(34,197,94,0.13), rgba(34,197,94,0.06)); }
.status-badge.trial .status-icon { background: linear-gradient(135deg, rgba(249,115,22,0.13), rgba(249,115,22,0.06)); }
.status-title { font-size: 11px; font-weight: 900; letter-spacing: 1px; }
.status-badge.master .status-title { color: var(--master-green); }
.status-badge.trial .status-title { color: var(--orange); }
.status-desc { font-size: 9px; margin-top: 1px; }
.status-badge.master .status-desc { color: #166534; }
.status-badge.trial .status-desc { color: #9A3412; }
.trial-count {
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  border-radius: 24px;
  padding: 3px 10px;
  font-size: 13px; font-weight: 900; color: #000;
  box-shadow: 0 2px 8px rgba(249,115,22,0.3);
}

/* ── MAIN CONTENT ── */
.content {
  flex: 1;
  padding: 10px 12px 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── CATEGORY ACCORDION ── */
.category {
  margin-bottom: 8px;
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: border-color 0.3s;
}
.category.open {
  border-color: var(--cat-color, var(--border2));
  box-shadow: 0 4px 20px var(--cat-shadow, rgba(0,0,0,0.3));
}
.category.locked {
  background: #080808;
  border-color: #111;
  opacity: 0.35;
}
.cat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.cat-header:active { opacity: 0.85; }
.cat-glow {
  position: absolute;
  left: 0; top: 15%; bottom: 15%;
  width: 3px;
  border-radius: 0 3px 3px 0;
}
.cat-icon {
  width: 46px; height: 46px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.cat-label { font-size: 15px; font-weight: 800; letter-spacing: 0.3px; color: #eee; }
.category.locked .cat-label { color: var(--text5); }
.cat-desc { font-size: 10px; color: var(--text4); margin-top: 2px; }
.category.locked .cat-desc { color: #282828; }
.cat-count {
  font-size: 9px; font-weight: 700; color: var(--text4);
  background: #1a1a1a;
  border-radius: 10px;
  padding: 3px 8px;
  letter-spacing: 0.5px;
}
.cat-arrow {
  font-size: 14px; color: var(--text4);
  transition: transform 0.3s;
  margin-left: auto;
  flex-shrink: 0;
}
.category.open .cat-arrow { transform: rotate(180deg); }

/* ── SUB COMMANDS ── */
.cat-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.category.open .cat-body {
  max-height: 2000px;
}
.sub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 0 10px 12px;
}
.sub-cmd {
  background: linear-gradient(135deg, #0d0d0d, #0a0a0a);
  border: 1px solid #1a1a1a;
  border-radius: 14px;
  padding: 14px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.sub-cmd:active { transform: scale(0.95); background: #151515; }
.sub-cmd .sub-icon { font-size: 26px; margin-bottom: 6px; display: block; }
.sub-cmd .sub-label { font-size: 11px; font-weight: 700; color: #ddd; line-height: 1.2; }
.sub-cmd .sub-hint { font-size: 8px; color: var(--text5); margin-top: 3px; letter-spacing: 0.3px; }
.sub-cmd.file-cmd { border-color: #222; }
.sub-cmd.file-cmd:active { border-color: var(--cat-color, #333); }
.sub-cmd .file-tag {
  position: absolute; top: 6px; right: 6px;
  font-size: 7px; font-weight: 800;
  background: #1a1a1a;
  color: var(--text4);
  padding: 2px 5px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

/* ── JOB CARDS ── */
.job-card {
  background: linear-gradient(135deg, var(--surface), #0f0f0f);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 8px;
}
.job-card.done { border-color: rgba(34,197,94,0.2); box-shadow: 0 4px 16px rgba(34,197,94,0.06); }
.job-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.job-icon { font-size: 22px; }
.job-name { font-size: 12px; font-weight: 700; color: #ddd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.job-meta { font-size: 10px; color: var(--text4); margin-top: 2px; }
.job-status { font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 24px; letter-spacing: 0.5px; }
.job-status.done { background: rgba(5,46,22,0.6); color: #22C55E; }
.job-status.error { background: rgba(45,10,10,0.6); color: #EF4444; }
.job-status.pending { background: rgba(26,26,0,0.6); color: #EAB308; }
.job-progress { background: #1a1a1a; border-radius: 6px; height: 4px; overflow: hidden; }
.job-progress-bar { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
.job-download {
  display: block; margin-top: 10px;
  border-radius: 12px; padding: 11px 0;
  text-align: center; color: #000;
  font-weight: 900; font-size: 13px;
  text-decoration: none; letter-spacing: 0.5px;
}
.job-error { margin-top: 6px; font-size: 10px; color: var(--red); background: rgba(26,0,0,0.4); border-radius: 8px; padding: 5px 8px; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 50px 0; color: var(--text5); }
.empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.5; }
.empty-text { font-size: 13px; font-weight: 600; color: var(--text4); }
.empty-btn {
  margin-top: 16px;
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  border: none; border-radius: 14px;
  padding: 12px 28px; color: #000;
  font-weight: 800; cursor: pointer;
  font-size: 13px; font-family: inherit;
  box-shadow: 0 4px 16px rgba(249,115,22,0.3);
}

/* ── FUEL EMPTY ── */
.fuel-empty {
  background: linear-gradient(135deg, #1a0000, #200000);
  border: 1px solid rgba(127,29,29,0.2);
  border-radius: 14px;
  padding: 14px 16px;
  text-align: center;
  box-shadow: 0 4px 16px rgba(239,68,68,0.06);
  margin-bottom: 8px;
}
.fuel-title { font-size: 13px; font-weight: 800; color: var(--red); }
.fuel-desc { font-size: 10px; color: #991B1B; margin-top: 3px; }

/* ── FOOTER ── */
.footer {
  padding: 12px 16px env(safe-area-inset-bottom, 12px);
  text-align: center;
  font-size: 9px;
  color: #222;
  letter-spacing: 0.5px;
}

/* ── LOADING ── */
.loading-screen {
  min-height: 100dvh;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  position: fixed; inset: 0; z-index: 100;
  transition: opacity 0.4s;
}
.loading-screen.hide { opacity: 0; pointer-events: none; }
.loading-ring {
  width: 60px; height: 60px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(249,115,22,0.25), rgba(249,115,22,0.06));
  border: 2px solid rgba(249,115,22,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  animation: loadPulse 1.5s ease-in-out infinite;
}
@keyframes loadPulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.1); opacity: 1; }
}

#fileInput { display: none; }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div style="text-align:center">
    <div class="loading-ring">🔥</div>
    <div style="font-size:18px;font-weight:800;color:var(--orange);letter-spacing:3px">FENIX</div>
    <div style="font-size:10px;color:var(--text4);margin-top:5px;letter-spacing:1px">OTONOM PANEL</div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo-icon">🔥</div>
    <div>
      <div class="logo-text">FENIX</div>
      <div class="logo-sub">OTONOM</div>
    </div>
  </div>
  <div class="header-right">
    <div class="credit-badge" id="creditBadge">
      <span style="font-size:11px">⚡</span>
      <span class="credit-num" id="creditNum">15</span>
    </div>
    <button class="jobs-btn" id="jobsBtn" onclick="toggleView()">
      📋 <span id="jobsBtnText"></span>
    </button>
  </div>
</div>

<!-- STATUS BADGE -->
<div id="statusArea"></div>

<!-- MAIN -->
<div class="content" id="mainContent"></div>

<!-- FOOTER -->
<div class="footer">Telefonu kapatsan da islem devam eder · Fenix AI</div>

<!-- FILE INPUT -->
<input type="file" id="fileInput">

<script>
// ════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════
const API = window.location.origin;
const TRIAL_MAX = 2;

// ════════════════════════════════════════

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let plan = localStorage.getItem('fenix_plan') || 'free';
let credits = parseInt(localStorage.getItem('fenix_otonom_credits') || '15');
let trialCredits = parseInt(localStorage.getItem('fenix_trial_credits') ?? TRIAL_MAX);
let jobs = JSON.parse(localStorage.getItem('fenix_jobs') || '[]');
let currentView = 'shortcuts'; // shortcuts | jobs
let openCategoryId = null;
let activeUploadCmd = null;

// ════════════════════════════════════════
//  QR TOKEN LOGIN
// ════════════════════════════════════════
(async function initToken() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('t');
  if (token && token.length >= 8) {
    try {
      const res = await fetch(`${API}/api/card/${token}`);
      if (res.ok) {
        const data = await res.json();
        plan = data.plan || 'free';
        credits = data.credits || 15;
        localStorage.setItem('fenix_plan', plan);
        localStorage.setItem('fenix_otonom_credits', credits);
      }
    } catch(e) {}
  }
  if (localStorage.getItem('fenix_trial_credits') === null && plan !== 'free') {
    trialCredits = TRIAL_MAX;
    localStorage.setItem('fenix_trial_credits', trialCredits);
  }
  // Eski localStorage temizle (format degisti)
  try {
    const oldJobs = JSON.parse(localStorage.getItem('fenix_jobs') || '[]');
    if (oldJobs.length > 0 && oldJobs[0].shortcutId) {
      localStorage.removeItem('fenix_jobs');
      jobs = [];
    }
  } catch(e) { localStorage.removeItem('fenix_jobs'); jobs = []; }

  setTimeout(() => {
    const ls = document.getElementById('loadingScreen');
    if (ls) { ls.classList.add('hide'); setTimeout(() => ls.remove(), 400); }
  }, 600);

  try { render(); } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div style="padding:20px;color:#F97316;font-size:14px;font-weight:700">Yukleniyor... Sayfayi yenileyin.<br><br><span style="font-size:11px;color:#555">'+e.message+'</span></div>';
  }
})();

// ════════════════════════════════════════
//  CARD LOGIC
// ════════════════════════════════════════
function getOwnedCards() {
  if (plan === 'master' || plan === 'otonom') return ALL_IDS;
  if (plan === 'pro') return ['pro'];
  if (plan === '360') return ['360'];
  if (plan === 'dublaj') return ['dublaj'];
  if (plan === 'eticaret') return ['eticaret'];
  return [];
}

function getActiveCards() {
  if (plan === 'master' || plan === 'otonom') return ALL_IDS;
  if (trialCredits > 0) return ALL_IDS;
  return getOwnedCards();
}

function isMaster() { return plan === 'master' || plan === 'otonom'; }
function isTrialActive() { return trialCredits > 0 && !isMaster(); }

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function render() {
  try {
    renderCredits();
    renderStatus();
    renderJobsBtn();
    if (currentView === 'shortcuts') renderShortcuts();
    else renderJobs();
  } catch(e) {
    console.error('Render error:', e);
    const c = document.getElementById('mainContent');
    if (c) c.innerHTML = '<div style="padding:20px;color:#F97316">Hata: '+e.message+'</div>';
  }
}

function renderCredits() {
  const badge = document.getElementById('creditBadge');
  const num = document.getElementById('creditNum');
  num.textContent = credits;
  badge.className = 'credit-badge' + (credits <= 3 ? ' low' : '');
}

function renderStatus() {
  const area = document.getElementById('statusArea');
  if (isMaster()) {
    area.innerHTML = `
      <div class="status-badge master">
        <div class="status-icon">🔓</div>
        <div style="flex:1">
          <div class="status-title">MASTER OTONOM</div>
          <div class="status-desc">Tum kisayollar ve katmanlar aktif</div>
        </div>
      </div>`;
  } else if (isTrialActive()) {
    area.innerHTML = `
      <div class="status-badge trial">
        <div class="status-icon">🎁</div>
        <div style="flex:1">
          <div class="status-title">DENEME HAKKI</div>
          <div class="status-desc">Tum ozellikler acik — ${trialCredits} kullanim kaldi</div>
        </div>
        <div class="trial-count">${trialCredits}</div>
      </div>`;
  } else {
    area.innerHTML = '';
  }
}

function renderJobsBtn() {
  const btn = document.getElementById('jobsBtn');
  const text = document.getElementById('jobsBtnText');
  const activeJobs = jobs.filter(j => j.status === 'processing' || j.status === 'queued').length;

  if (currentView === 'jobs') {
    text.textContent = '← Geri';
    btn.className = 'jobs-btn';
    btn.querySelector('.badge')?.remove();
  } else {
    text.textContent = jobs.length > 0 ? jobs.length : '';
    btn.className = 'jobs-btn' + (activeJobs > 0 ? ' active' : '');
    btn.querySelector('.badge')?.remove();
    if (activeJobs > 0) {
      const b = document.createElement('span');
      b.className = 'badge';
      b.textContent = activeJobs;
      btn.appendChild(b);
    }
  }
}

function renderShortcuts() {
  const active = getActiveCards();
  const content = document.getElementById('mainContent');
  let html = '';

  CATEGORIES.forEach(cat => {
    const unlocked = active.includes(cat.id);
    const isOpen = openCategoryId === cat.id && unlocked;
    const cmdCount = cat.commands.length;

    html += `
      <div class="category ${isOpen ? 'open' : ''} ${unlocked ? '' : 'locked'}" style="--cat-color:${cat.color}22;--cat-shadow:${cat.shadow}">
        <div class="cat-header" onclick="${unlocked ? `toggleCategory('${cat.id}')` : ''}">
          ${unlocked ? `<div class="cat-glow" style="background:${cat.gradient};box-shadow:0 0 12px ${cat.color}66"></div>` : ''}
          <div class="cat-icon" style="background:${unlocked ? cat.color+'18' : '#0e0e0e'};border:1px solid ${unlocked ? cat.color+'15' : '#1a1a1a'}">
            ${unlocked ? cat.icon : '🔒'}
          </div>
          <div style="flex:1;min-width:0">
            <div class="cat-label">${cat.label}</div>
            <div class="cat-desc">${unlocked ? cat.desc : cat.id.toUpperCase()+' karti veya Otonom paketi al'}</div>
          </div>
          ${unlocked ? `<span class="cat-count">${cmdCount}</span>` : ''}
          ${unlocked ? `<span class="cat-arrow">▼</span>` : ''}
        </div>
        ${unlocked ? `
        <div class="cat-body">
          <div class="sub-grid">
            ${cat.commands.map(cmd => `
              <div class="sub-cmd ${cmd.type === 'file' ? 'file-cmd' : ''}" onclick="tapCommand('${cat.id}','${cmd.id}')">
                ${cmd.type === 'file' ? '<span class="file-tag">DOSYA</span>' : ''}
                <span class="sub-icon">${cmd.icon}</span>
                <div class="sub-label">${cmd.label}</div>
                <div class="sub-hint">${cmd.hint}</div>
              </div>
            `).join('')}
          </div>
        </div>` : ''}
      </div>`;
  });

  if (credits === 0) {
    html += `
      <div class="fuel-empty">
        <div class="fuel-title">Yakit Tukendi</div>
        <div class="fuel-desc">Kredi yukle ve devam et</div>
      </div>`;
  }

  content.innerHTML = html;
}

function renderJobs() {
  const content = document.getElementById('mainContent');
  const activeJobs = jobs.filter(j => j.status === 'processing' || j.status === 'queued').length;

  if (jobs.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">Henuz islem yok</div>
        <button class="empty-btn" onclick="toggleView()">Komut Sec</button>
      </div>`;
    return;
  }

  let html = `<div style="font-size:10px;color:var(--text5);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-left:4px">${activeJobs > 0 ? activeJobs+' islem devam ediyor' : 'Gecmis islemler'}</div>`;

  jobs.forEach(job => {
    const cat = CATEGORIES.find(c => c.id === job.categoryId) || CATEGORIES[0];
    const cmd = cat.commands.find(c => c.id === job.commandId) || cat.commands[0];
    const elapsed = formatTime(Date.now() - job.startedAt);
    const statusLabel = job.status === 'done' ? 'HAZIR' : job.status === 'error' ? 'HATA' : job.status === 'uploading' ? 'YUKLUYOR' : job.status === 'queued' ? 'SIRADA' : '%'+job.progress;
    const statusClass = job.status === 'done' ? 'done' : job.status === 'error' ? 'error' : 'pending';

    html += `
      <div class="job-card ${job.status === 'done' ? 'done' : ''}">
        <div class="job-header">
          <span class="job-icon">${cmd.icon}</span>
          <div style="flex:1;min-width:0">
            <div class="job-name">${job.fileName || cmd.label}</div>
            <div class="job-meta">${cat.label} → ${cmd.label} · ${elapsed}</div>
          </div>
          <span class="job-status ${statusClass}">${statusLabel}</span>
        </div>
        ${['processing','queued','uploading'].includes(job.status) ? `
          <div class="job-progress">
            <div class="job-progress-bar" style="background:${cat.gradient};width:${job.status==='uploading'?10:job.status==='queued'?5:job.progress}%;box-shadow:0 0 8px ${cat.color}44"></div>
          </div>` : ''}
        ${job.status === 'done' && job.outputUrl ? `
          <a href="${job.outputUrl}" download class="job-download" style="background:${cat.gradient};box-shadow:0 4px 16px ${cat.color}33">INDIR</a>` : ''}
        ${job.status === 'error' ? `<div class="job-error">${job.error||'Bilinmeyen hata'}</div>` : ''}
      </div>`;
  });

  content.innerHTML = html;
}

// ════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════
function toggleView() {
  currentView = currentView === 'shortcuts' ? 'jobs' : 'shortcuts';
  render();
}

function toggleCategory(catId) {
  openCategoryId = openCategoryId === catId ? null : catId;
  render();
}

function tapCommand(catId, cmdId) {
  if (credits <= 0) { showToast('Yakit tukendi! Kredi yukle.', 'error'); return; }

  const cat = CATEGORIES.find(c => c.id === catId);
  const cmd = cat.commands.find(c => c.id === cmdId);

  if (cmd.type === 'file') {
    activeUploadCmd = { catId, cmdId, accept: cmd.accept, endpoint: cmd.endpoint, field: cmd.field };
    const input = document.getElementById('fileInput');
    input.accept = cmd.accept;
    input.click();
  } else {
    // Action type — no file needed, direct API call
    executeAction(catId, cmdId, cmd.endpoint);
  }
}

async function executeAction(catId, cmdId, endpoint) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const cmd = cat.commands.find(c => c.id === cmdId);
  const jobId = crypto.randomUUID();

  jobs.unshift({ id: jobId, categoryId: catId, commandId: cmdId, fileName: null, status: 'queued', progress: 0, startedAt: Date.now() });
  saveJobs();
  currentView = 'jobs';
  render();

  try {
    const res = await fetch(`${API}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan, action: cmdId })
    });
    if (!res.ok) throw new Error('Islem basarisiz');
    const data = await res.json();
    updateJob(jobId, { id: data.jobId || data.id || jobId, status: data.status === 'done' ? 'done' : 'processing', progress: data.progress || 0, outputUrl: data.downloadUrl });

    deductCredit(catId);
    showToast('Kuyruga alindi', 'ok');
  } catch(err) {
    updateJob(jobId, { status: 'error', error: err.message || 'Hata' });
    showToast(err.message || 'Hata olustu', 'error');
  }
  render();
}

document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files?.[0];
  if (!file || !activeUploadCmd) return;

  const { catId, cmdId, endpoint, field } = activeUploadCmd;
  const jobId = crypto.randomUUID();

  jobs.unshift({ id: jobId, categoryId: catId, commandId: cmdId, fileName: file.name, status: 'uploading', progress: 0, startedAt: Date.now() });
  saveJobs();
  currentView = 'jobs';
  render();

  try {
    const fd = new FormData();
    fd.append(field, file, file.name);

    // Direct upload endpoints (360 stitch, remove-bg etc.)
    const directEndpoints = ['/api/pro/stitch','/api/pro/remove-bg','/api/pro/panorama','/api/pro/product-photo','/api/pro/catalog','/api/pro/product-spin','/api/pro/mockup','/api/pro/watermark','/api/pro/enhance','/api/pro/multi-angle','/api/pro/banner'];
    if (directEndpoints.includes(endpoint)) {
      const res = await fetch(`${API}${endpoint}`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error('Islem basarisiz');
      const data = await res.json();
      updateJob(jobId, { id: data.jobId||data.id||jobId, status: data.downloadUrl ? 'done' : 'queued', progress: data.downloadUrl ? 100 : 0, outputUrl: data.downloadUrl });
    } else {
      // Upload first, then start job
      const uploadRes = await fetch(`${API}/api/pro/upload`, { method: 'POST', body: fd });
      if (!uploadRes.ok) throw new Error('Yukleme basarisiz');
      const { fileId } = await uploadRes.json();

      const body = { fileId, action: cmdId };
      if (catId === 'dublaj') { body.targetLang = 'tr'; body.sourceLang = 'tr'; }

      const jobRes = await fetch(`${API}${endpoint}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!jobRes.ok) throw new Error('Islem baslatilamadi');
      const jobData = await jobRes.json();
      updateJob(jobId, { id: jobData.jobId||jobData.id||jobId, status: 'queued', progress: 0 });
    }

    deductCredit(catId);
    showToast('Kuyruga alindi — telefonu kapatsan da devam eder', 'ok');
  } catch(err) {
    updateJob(jobId, { status: 'error', error: err.message || 'Hata' });
    showToast(err.message || 'Hata olustu', 'error');
  }

  activeUploadCmd = null;
  this.value = '';
  render();
});

function deductCredit(catId) {
  const owned = getOwnedCards();
  if (isTrialActive() && !owned.includes(catId)) {
    trialCredits--;
    localStorage.setItem('fenix_trial_credits', trialCredits);
  } else {
    credits--;
    localStorage.setItem('fenix_otonom_credits', credits);
  }
}

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function updateJob(id, updates) {
  jobs = jobs.map(j => j.id === id ? { ...j, ...updates } : j);
  saveJobs();
  render();
}

function saveJobs() {
  localStorage.setItem('fenix_jobs', JSON.stringify(jobs));
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  return Math.floor(s/60) + 'd ' + (s%60) + 's';
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:env(safe-area-inset-bottom,20px);left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:14px;font-size:12px;font-weight:700;z-index:999;animation:fadeUp .3s ease;font-family:Inter,sans-serif;max-width:90%;text-align:center;`;
  if (type === 'error') {
    t.style.background = 'linear-gradient(135deg,#2d0a0a,#1a0000)';
    t.style.color = '#EF4444';
    t.style.border = '1px solid #7F1D1D33';
  } else {
    t.style.background = 'linear-gradient(135deg,#052e16,#0a1a0a)';
    t.style.color = '#22C55E';
    t.style.border = '1px solid #16653433';
  }
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2500);
}

// ════════════════════════════════════════
//  POLLING
// ════════════════════════════════════════
setInterval(async () => {
  const active = jobs.filter(j => j.status === 'processing' || j.status === 'queued');
  if (!active.length) return;
  for (const job of active) {
    try {
      const cat = CATEGORIES.find(c => c.id === job.categoryId);
      let url;
      if (job.categoryId === '360') url = `${API}/api/pro/stitch/status/${job.id}`;
      else if (job.categoryId === 'dublaj') url = `${API}/api/dubbing/status/${job.id}`;
      else if (job.categoryId === 'otonom') url = `${API}/api/otonom/status/${job.id}`;
      else url = `${API}/api/pro/render-progress/${job.id}`;

      const res = await fetch(url);
      if (!res.ok) continue;
      const d = await res.json();
      updateJob(job.id, { status: d.status, progress: d.progress ?? job.progress, outputUrl: d.downloadUrl || d.outputUrl, error: d.error });
      if (d.status === 'done') showToast('Hazir! Indir butonuna bas.', 'ok');
    } catch(e) {}
  }
}, 3000);

// Fade-up animation
const style = document.createElement('style');
style.textContent = '@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
document.head.appendChild(style);
</script>
