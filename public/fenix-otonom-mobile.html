<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>Fenix Otonom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050505;--surface:#0c0c0c;--surface2:#111;--surface3:#161616;
  --border:#1a1a1a;--border2:#222;
  --text:#fff;--text2:#ddd;--text3:#999;--text4:#666;--text5:#333;
  --orange:#F97316;--orange2:#EA580C;--blue:#3B82F6;--blue2:#2563EB;
  --purple:#8B5CF6;--purple2:#7C3AED;--green:#10B981;--green2:#059669;
  --yellow:#EAB308;--yellow2:#CA8A04;--red:#EF4444;--master:#22C55E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  height:100dvh;display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none;overflow:hidden;
}

/* ── HEADER ── */
.header{
  padding:env(safe-area-inset-top,10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,#0f0f0f 0%,var(--bg) 100%);
  border-bottom:1px solid #111;flex-shrink:0;
}
.h-left{display:flex;align-items:center;gap:10px}
.h-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--orange),#D97706);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 4px 20px rgba(249,115,22,0.35);
}
.h-brand{display:flex;flex-direction:column}
.h-title{font-weight:900;font-size:16px;letter-spacing:3px;
  background:linear-gradient(135deg,#fff,#ccc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h-sub{font-size:7px;color:var(--text4);letter-spacing:2px;text-transform:uppercase}
.h-credit{
  background:linear-gradient(135deg,#111,#0a0a0a);
  border:1px solid #1e1e1e;border-radius:24px;
  padding:6px 14px;display:flex;align-items:center;gap:5px;
  font-size:14px;font-weight:900;color:var(--orange);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
}
.h-credit.low{color:var(--red);border-color:#7F1D1D44}

/* ── TABS ── */
.tabs{
  display:flex;flex-shrink:0;overflow-x:auto;
  background:var(--surface);
  border-bottom:1px solid #111;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:0;padding:10px 6px 8px;
  text-align:center;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .25s;position:relative;
}
.tab .t-icon{font-size:18px;display:block;margin-bottom:3px}
.tab .t-label{font-size:8px;font-weight:700;color:var(--text5);letter-spacing:0.5px;text-transform:uppercase}
.tab.active .t-label{color:var(--text2)}
.tab.active{border-bottom-color:var(--tab-color,var(--orange))}
.tab.active::after{
  content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;
  background:var(--tab-color,var(--orange));filter:blur(4px);opacity:0.6;
}
.tab.locked{opacity:0.2}

/* ── CONTENT ── */
.content{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 0 8px;
}

/* ── SECTION ── */
.section{padding:12px 12px 0}
.sec-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;padding:0 4px;
}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--sec-color,#222) 0%,transparent 100%)}
.sec-title{
  font-size:9px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--sec-color,var(--text4));
  white-space:nowrap;
}
.sec-line-r{flex:1;height:1px;background:linear-gradient(90deg,transparent 0%,var(--sec-color,#222) 100%)}

/* ── COMMAND GRID ── */
.cmd-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}
.cmd{
  background:linear-gradient(145deg,var(--surface2),var(--surface));
  border:1px solid #181818;border-radius:14px;
  padding:14px 8px 10px;text-align:center;
  cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;
}
.cmd::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);
}
.cmd:active{transform:scale(0.95);background:#151515;border-color:#252525}
.cmd .c-icon{font-size:26px;display:block;line-height:1;margin-bottom:6px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.cmd .c-label{font-size:9px;font-weight:700;color:var(--text3);line-height:1.2}

/* ── JOBS (inline) ── */
.jobs{flex-shrink:0;max-height:28vh;overflow-y:auto;padding:4px 10px}
.job{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:8px 12px;margin-bottom:4px;
}
.job.done{border-color:rgba(34,197,94,0.15);background:linear-gradient(135deg,#050f05,var(--surface2))}
.j-icon{font-size:18px;flex-shrink:0}
.j-info{flex:1;min-width:0}
.j-name{font-size:10px;font-weight:700;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.j-meta{font-size:8px;color:var(--text4);margin-top:1px}
.j-bar{height:3px;background:#1a1a1a;border-radius:3px;margin-top:4px;overflow:hidden}
.j-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.j-status{font-size:7px;font-weight:900;padding:2px 6px;border-radius:10px;flex-shrink:0;letter-spacing:0.5px}
.j-status.pending{background:#1a1a00;color:var(--yellow)}
.j-status.done{background:#001a0a;color:var(--master)}
.j-status.error{background:#1a0000;color:var(--red)}
.j-dl{background:linear-gradient(135deg,var(--master),#059669);border-radius:8px;padding:4px 10px;font-size:8px;font-weight:900;color:#000;text-decoration:none;flex-shrink:0}

/* ── MESSAGE BAR ── */
.msg-bar{
  flex-shrink:0;padding:8px 10px env(safe-area-inset-bottom,8px);
  background:linear-gradient(180deg,var(--bg),#080808);
  border-top:1px solid #111;
}
.msg-row{display:flex;gap:6px;align-items:center}
.msg-input{
  flex:1;background:var(--surface2);border:1px solid #1e1e1e;
  border-radius:22px;padding:11px 16px;color:var(--text);
  font-size:14px;font-family:inherit;outline:none;
  transition:border-color .2s;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.2);
}
.msg-input:focus{border-color:var(--orange);box-shadow:inset 0 2px 4px rgba(0,0,0,0.2),0 0 12px rgba(249,115,22,0.1)}
.msg-input::placeholder{color:var(--text5)}
.msg-send{
  width:40px;height:40px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#000;font-size:17px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(249,115,22,0.3);transition:transform .1s;
}
.msg-send:active{transform:scale(0.9)}
.msg-file{
  width:40px;height:40px;border-radius:50%;border:1px solid #1e1e1e;
  background:var(--surface2);color:var(--text4);font-size:18px;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.msg-file:active{background:#1a1a1a;border-color:var(--orange)}

/* ── TOAST ── */
.toast{
  position:fixed;top:env(safe-area-inset-top,16px);left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:14px;font-size:11px;font-weight:700;
  z-index:999;animation:fadeDown .3s ease;max-width:90%;text-align:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.toast.ok{background:rgba(5,46,22,0.85);color:var(--master);border:1px solid rgba(34,197,94,0.15)}
.toast.error{background:rgba(45,10,10,0.85);color:var(--red);border:1px solid rgba(239,68,68,0.15)}
@keyframes fadeDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── LOADING ── */
.loading-screen{
  height:100dvh;background:var(--bg);display:flex;align-items:center;justify-content:center;
  position:fixed;inset:0;z-index:100;transition:opacity .4s;
}
.loading-screen.hide{opacity:0;pointer-events:none}
.ld-ring{width:56px;height:56px;margin:0 auto 14px;border-radius:50%;
  background:radial-gradient(circle,rgba(249,115,22,0.2),transparent);
  border:2px solid rgba(249,115,22,0.15);display:flex;align-items:center;justify-content:center;
  font-size:26px;animation:pulse 1.5s ease-in-out infinite;
  box-shadow:0 0 30px rgba(249,115,22,0.1);
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}

/* ═══ RESPONSIVE ═══ */
@media(min-width:600px){
  .header{padding:env(safe-area-inset-top,14px) 24px 12px}
  .h-logo{width:42px;height:42px;font-size:20px;border-radius:12px}
  .h-title{font-size:18px}
  .h-sub{font-size:8px}
  .h-credit{font-size:16px;padding:7px 16px}
  .tab{padding:12px 8px 10px}
  .tab .t-icon{font-size:22px;margin-bottom:4px}
  .tab .t-label{font-size:9px}
  .section{padding:16px 16px 0}
  .sec-title{font-size:10px}
  .cmd-grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .cmd{padding:18px 10px 14px;border-radius:16px}
  .cmd .c-icon{font-size:32px;margin-bottom:8px}
  .cmd .c-label{font-size:10px}
  .jobs{padding:6px 16px}
  .msg-bar{padding:10px 16px env(safe-area-inset-bottom,10px)}
  .msg-input{font-size:15px;padding:13px 20px}
  .msg-send,.msg-file{width:46px;height:46px}
}
@media(min-width:900px){
  .cmd-grid{grid-template-columns:repeat(5,1fr);gap:10px}
  .cmd{padding:20px 12px 16px;border-radius:18px}
  .cmd .c-icon{font-size:36px;margin-bottom:10px}
  .cmd .c-label{font-size:11px}
  .section{padding:20px 24px 0}
}
@media(orientation:landscape) and (max-height:500px){
  .cmd-grid{grid-template-columns:repeat(5,1fr);gap:4px}
  .cmd{padding:8px 4px 6px}
  .cmd .c-icon{font-size:20px;margin-bottom:3px}
  .cmd .c-label{font-size:7px}
  .section{padding:6px 8px 0}
  .sec-header{margin-bottom:4px}
  .tab{padding:6px 4px 4px}
  .tab .t-icon{font-size:14px;margin-bottom:1px}
  .tab .t-label{font-size:7px}
}

#fileInput{display:none}
</style>
</head>

const NOTIF = {pro:'Videon hazir! 🎬','360':'360 videon hazir! 🌐',dublaj:'Dublajin hazir! 🎙️',eticaret:'Urunun hazir! 🛍️',otonom:'Islemin bitti! 🤖'};

// ── STATE ──
let cardToken = new URLSearchParams(window.location.search).get('t') || localStorage.getItem('fenix_card_token') || '';
let plan = localStorage.getItem('fenix_plan') || 'free';
let credits = parseInt(localStorage.getItem('fenix_otonom_credits') || '0');
let trialCredits = parseInt(localStorage.getItem('fenix_trial_credits') ?? TRIAL_MAX);
let jobs = JSON.parse(localStorage.getItem('fenix_jobs') || '[]');
let activeCat = 'pro';
let activeUpload = null;

// ── CARD LOGIC ──
function getOwned() {
  if (plan==='master'||plan==='otonom') return ALL_IDS;
  if (plan==='pro') return ['pro'];
  if (plan==='360') return ['360'];
  if (plan==='dublaj') return ['dublaj'];
  if (plan==='eticaret') return ['eticaret'];
  return [];
}
function getActive() {
  if (plan==='master'||plan==='otonom') return ALL_IDS;
  if (trialCredits > 0) return ALL_IDS;
  return getOwned();
}
function isMaster() { return plan==='master'||plan==='otonom'; }
function isTrialActive() { return trialCredits > 0 && !isMaster(); }

// ── NOTIFICATIONS ──
function reqNotif() { if ('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }
function sendNotif(catId, name) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    new Notification(NOTIF[catId]||'Hazir!', { body:name||'Fenix tamamladi.', icon:'/fenix-icon-192.png', badge:'/fenix-icon-192.png', tag:'fenix-done', vibrate:[200,100,200] });
  } catch(e) {
    if (navigator.serviceWorker?.ready) navigator.serviceWorker.ready.then(r => r.showNotification(NOTIF[catId]||'Hazir!',{body:name||'',icon:'/fenix-icon-192.png'}));
  }
}

// ── INIT ──
(async function init() {
  const t = new URLSearchParams(window.location.search).get('t');
  if (t && t.length >= 8) {
    cardToken = t;
    localStorage.setItem('fenix_card_token', t);
    try {
      const r = await fetch(`${API}/api/card/${t}`);
      if (r.ok) {
        const d = await r.json();
        plan = d.plan || 'free';
        credits = d.credits || 0;
        localStorage.setItem('fenix_plan', plan);
        localStorage.setItem('fenix_otonom_credits', credits);
      }
    } catch(e) {}
  } else if (cardToken) {
    // Token varsa backend'den güncel kredi çek
    try {
      const r = await fetch(`${API}/api/card/${cardToken}/credits`);
      if (r.ok) { const d = await r.json(); credits = d.credits || 0; plan = d.plan || plan; localStorage.setItem('fenix_otonom_credits', credits); }
    } catch(e) {}
  }
  // Herkese deneme kredisi ver
  if (trialCredits <= 0 || !localStorage.getItem('fenix_trial_credits')) { trialCredits=TRIAL_MAX; localStorage.setItem('fenix_trial_credits',String(trialCredits)); }
  // Kredi 0 ise varsayılan test kredisi ver (kart yoksa her zaman)
  if (credits <= 0) { credits = 30; localStorage.setItem('fenix_otonom_credits', String(credits)); }
  try { const o=JSON.parse(localStorage.getItem('fenix_jobs')||'[]'); if(o.length>0&&o[0].shortcutId){localStorage.removeItem('fenix_jobs');jobs=[]} } catch(e){localStorage.removeItem('fenix_jobs');jobs=[]}
  reqNotif();
  setTimeout(()=>{const l=document.getElementById('loadingScreen');if(l){l.classList.add('hide');setTimeout(()=>l.remove(),400)}},500);
  try{render()}catch(e){document.getElementById('contentArea').innerHTML='<div style="padding:20px;color:var(--orange)">'+e.message+'</div>'}
})();

// ── RENDER ──
function render() { try{renderCredits();renderTabs();renderContent();renderJobs()}catch(e){console.error(e)} }

function renderCredits() {
  document.getElementById('creditNum').textContent = credits;
  document.getElementById('creditBadge').className = 'h-credit' + (credits<=3?' low':'');
}

function renderTabs() {
  const active = getActive();
  document.getElementById('tabsArea').innerHTML = CATEGORIES.map(c => {
    const ok = active.includes(c.id);
    return `<div class="tab ${activeCat===c.id?'active':''} ${ok?'':'locked'}" style="--tab-color:${c.tabColor}" onclick="${ok?`switchCat('${c.id}')`:`showToast('${c.label} karti gerekli','error')`}">
      <span class="t-icon">${c.icon}</span><span class="t-label">${c.label}</span>
    </div>`;
  }).join('');
}

function renderContent() {
  const cat = CATEGORIES.find(c=>c.id===activeCat);
  const active = getActive();
  const el = document.getElementById('contentArea');
  if (!active.includes(cat.id)) { el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text5)">🔒 Kart gerekli</div>'; return; }

  el.innerHTML = cat.sections.map(sec => `
    <div class="section">
      <div class="sec-header" style="--sec-color:${sec.color}">
        <div class="sec-line"></div>
        <span class="sec-title">${sec.title}</span>
        <div class="sec-line-r"></div>
      </div>
      <div class="cmd-grid">
        ${sec.cmds.map(cmd => `
          <div class="cmd" onclick="tapCmd('${cat.id}','${cmd.id}',${cmd.isAction?'true':'false'})">
            <span class="c-icon">${cmd.icon}</span>
            <div class="c-label">${cmd.label}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderJobs() {
  const el = document.getElementById('jobsArea');
  const show = [...jobs.filter(j=>['processing','queued','uploading'].includes(j.status)), ...jobs.filter(j=>j.status==='done'||j.status==='error').slice(0,3)];
  if (!show.length) { el.innerHTML=''; return; }
  el.innerHTML = show.map(job => {
    const cat = CATEGORIES.find(c=>c.id===job.catId)||CATEGORIES[0];
    const isAct = ['processing','queued','uploading'].includes(job.status);
    const stageLabels = {'removing-bg':'BG SILIYOR','generating-scene':'SAHNE URETIYOR','compositing':'BIRLESTIRIYOR','building-reels':'REELS OLUSTURUYOR','preparing':'HAZIRLANIYOR','starting':'BASLIYOR'};
    const st = job.status==='done'?'HAZIR':job.status==='error'?'HATA':job.status==='uploading'?'YUKLUYOR':job.status==='queued'?'SIRADA':job.stage&&stageLabels[job.stage]?stageLabels[job.stage]+' %'+job.progress:'%'+job.progress;
    const sc = job.status==='done'?'done':job.status==='error'?'error':'pending';
    return `<div class="job ${job.status==='done'?'done':''}">
      <span class="j-icon">${job.icon||'🔥'}</span>
      <div class="j-info">
        <div class="j-name">${job.name||job.cmdId}</div>
        <div class="j-meta">${cat.label} · ${fmtTime(Date.now()-job.ts)}</div>
        ${isAct?`<div class="j-bar"><div class="j-bar-fill" style="background:${cat.gradient};width:${job.status==='uploading'?10:job.status==='queued'?5:job.progress}%"></div></div>`:''}
      </div>
      <span class="j-status ${sc}">${st}</span>
      ${job.status==='done'&&job.url?`<a href="${job.url}" download class="j-dl">INDIR</a>`:''}
    </div>`;
  }).join('');
}

// ── ACTIONS ──
function switchCat(id) { activeCat=id; render(); }

function tapCmd(catId, cmdId, isAction) {
  // Kredi kontrolü
  const totalCredits = credits + trialCredits;
  if (totalCredits <= 0) { showToast('Kredi tukendi!','error'); return; }
  const cat = CATEGORIES.find(c=>c.id===catId);
  const cmd = findCmd(cat, cmdId);
  if (isAction) { execAction(catId, cmdId, cmd); }
  else {
    activeUpload = { catId, cmdId, accept: cat.defaultAccept, field: cat.defaultField, icon: cmd?.icon };
    const inp = document.getElementById('fileInput');
    inp.accept = cat.defaultAccept;
    inp.click();
  }
}

function findCmd(cat, cmdId) {
  for (const sec of cat.sections) { const c = sec.cmds.find(x=>x.id===cmdId); if(c) return c; }
  return null;
}

function pickFile() {
  const cat = CATEGORIES.find(c=>c.id===activeCat);
  const inp = document.getElementById('fileInput');
  activeUpload = { catId:cat.id, cmdId:'upload', accept:cat.defaultAccept, field:cat.defaultField, icon:'📎' };
  inp.accept = cat.defaultAccept;
  inp.click();
}

function sendMessage() {
  const inp = document.getElementById('msgInput');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  const jid = crypto.randomUUID();
  jobs.unshift({id:jid,catId:activeCat,cmdId:'msg',name:msg,icon:'💬',status:'queued',progress:0,ts:Date.now()});
  saveJobs(); render();
  fetch(`${API}/api/otonom/command`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan,command:msg,category:activeCat})})
    .then(r=>r.json()).then(d=>{updJob(jid,{id:d.jobId||jid,status:d.status==='done'?'done':'processing',progress:d.progress||0,url:d.downloadUrl});deduct(activeCat)})
    .catch(e=>updJob(jid,{status:'error',error:e.message}));
  showToast('Komut gonderildi','ok');
}

async function execAction(catId, cmdId, cmd) {
  const cat = CATEGORIES.find(c=>c.id===catId);
  const jid = crypto.randomUUID();
  jobs.unshift({id:jid,catId,cmdId,name:cmd?.label||cmdId,icon:cmd?.icon||'🤖',status:'queued',progress:0,ts:Date.now()});
  saveJobs(); render();
  try {
    // Otonom "Tam Oto" — dosya seçtir, pipeline'a gönder
    if (catId === 'otonom' && cmdId === 'oto_auto') {
      updJob(jid, { status: 'processing', progress: 0 });
      const inp = document.getElementById('fileInput');
      inp.accept = 'image/*';
      inp.onchange = async function() {
        const files = this.files;
        if (!files?.length) { updJob(jid, { status: 'error', error: 'Dosya secilmedi' }); return; }
        const fd = new FormData();
        for (let i = 0; i < files.length; i++) fd.append('photos', files[i], files[i].name);
        fd.append('category', 'giyim');
        fd.append('removeBg', 'true');
        fd.append('generateScene', 'true');
        fd.append('transition', 'auto');
        fd.append('lut', 'auto');
        fd.append('addLogo', 'true');
        updJob(jid, { name: `${files.length} foto → Reels`, progress: 5 });
        try {
          const r = await fetch(`${API}/api/pipeline/auto-produce`, { method: 'POST', body: fd });
          if (!r.ok) throw new Error('Pipeline basarisiz');
          const d = await r.json();
          if (d.jobId) { updJob(jid, { id: d.jobId, status: 'processing' }); pollPipelineJob(d.jobId, jid, catId); }
          deduct(catId); showToast('Otonom uretim basladi! 🔥','ok');
        } catch(e) { updJob(jid, { status: 'error', error: e.message }); showToast(e.message,'error'); }
        this.onchange = null; this.value = '';
      };
      inp.click();
      return;
    }

    const r = await fetch(`${API}${cat.defaultEndpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan,action:cmdId})});
    if(!r.ok) throw new Error('Basarisiz');
    const d = await r.json();
    updJob(jid,{id:d.jobId||jid,status:d.status==='done'?'done':'processing',progress:d.progress||0,url:d.downloadUrl});
    if(d.status==='done') sendNotif(catId,cmd?.label);
    deduct(catId); showToast('Kuyruga alindi','ok');
  } catch(e) { updJob(jid,{status:'error',error:e.message}); showToast(e.message,'error'); }
}

document.getElementById('fileInput').addEventListener('change', async function(e) {
  const files = e.target.files;
  if (!files?.length || !activeUpload) return;
  const {catId,cmdId,field,icon} = activeUpload;
  const cat = CATEGORIES.find(c=>c.id===catId);
  const jid = crypto.randomUUID();
  const fileCount = files.length;
  jobs.unshift({id:jid,catId,cmdId,name:fileCount>1?`${fileCount} dosya`:files[0].name,icon:icon||'📄',status:'uploading',progress:0,ts:Date.now()});
  saveJobs(); render();
  try {
    const fd = new FormData();

    // Pipeline endpoint'leri için özel işlem
    const isPipeline = cat.defaultEndpoint.startsWith('/api/pipeline');
    const isEticaret = catId === 'eticaret';

    if (isPipeline || isEticaret) {
      // Pipeline photos field'ı kullanır
      for (let i = 0; i < files.length; i++) {
        fd.append('photos', files[i], files[i].name);
      }
      // Kategori bilgisini ekle (pipeline sahne/LUT/geçiş seçimi için)
      fd.append('category', detectProductCategory(catId, cmdId));
      fd.append('removeBg', 'true');
      fd.append('generateScene', 'true');
      fd.append('transition', 'auto');
      fd.append('lut', 'auto');
      fd.append('addLogo', 'true');
      fd.append('logoText', 'Fenix AI');

      // BG sil komutu → sadece arka plan silme, reels değil
      const isBgOnly = (cmdId === 'et_removebg' || cmdId === 'et_changebg' || cmdId === 'et_whitebg');
      if (isBgOnly) {
        // remove-bg 'image' field bekliyor, photos'u sil, image olarak ekle
        fd.delete('photos');
        fd.append('image', files[0], files[0].name);
      }
      const endpoint = isBgOnly
        ? '/api/pipeline/remove-bg'
        : '/api/pipeline/auto-produce';

      const r = await fetch(`${API}${endpoint}`, { method: 'POST', body: fd });
      if (!r.ok) throw new Error('Basarisiz');
      const d = await r.json();

      if (d.jobId) {
        // Async job — polling başlat
        updJob(jid, { id: d.jobId, status: 'processing', progress: 5 });
        pollPipelineJob(d.jobId, jid, catId);
      } else if (d.downloadUrl) {
        updJob(jid, { status: 'done', progress: 100, url: d.downloadUrl });
        sendNotif(catId, files[0].name);
      } else {
        updJob(jid, { status: 'done', progress: 100, url: d.downloadUrl || d.fileId ? `/api/pipeline/download/${d.fileId}` : null });
      }
    } else {
      // Normal endpoint (PRO, 360, Dublaj)
      fd.append(field, files[0], files[0].name);
      const r = await fetch(`${API}${cat.defaultEndpoint}`, { method: 'POST', body: fd });
      if (!r.ok) throw new Error('Basarisiz');
      const d = await r.json();
      updJob(jid, { id: d.jobId || d.id || jid, status: d.downloadUrl ? 'done' : 'queued', progress: d.downloadUrl ? 100 : 0, url: d.downloadUrl });
      if (d.downloadUrl) sendNotif(catId, files[0].name);
    }

    deduct(catId); showToast('Kuyruga alindi','ok');
  } catch(e) { updJob(jid,{status:'error',error:e.message}); showToast(e.message,'error'); }
  activeUpload=null; this.value=''; render();
});

// Pipeline job polling — durumu canlı takip et
function pollPipelineJob(jobId, localJid, catId) {
  const iv = setInterval(async () => {
    try {
      const r = await fetch(`${API}/api/pipeline/status/${jobId}`);
      if (!r.ok) { clearInterval(iv); return; }
      const d = await r.json();
      updJob(localJid, { progress: d.progress || 0, stage: d.stage });
      if (d.status === 'done') {
        clearInterval(iv);
        updJob(localJid, { status: 'done', progress: 100, url: d.downloadUrl });
        sendNotif(catId, 'Reels');
        showToast('Reels hazir! 🔥','ok');
      } else if (d.status === 'error') {
        clearInterval(iv);
        updJob(localJid, { status: 'error', error: d.error });
        showToast(d.error || 'Hata olustu','error');
      }
    } catch(e) { /* polling devam */ }
  }, 2000);
  // 5dk timeout
  setTimeout(() => clearInterval(iv), 5 * 60 * 1000);
}

// Ürün kategorisi algıla (pipeline sahne/LUT seçimi için)
function detectProductCategory(catId, cmdId) {
  if (catId === 'eticaret') {

      et_jewelry:'taki',et_watch:'taki',
      et_phone:'elektronik',et_laptop:'elektronik',et_headphone:'elektronik',et_camera:'elektronik',et_tv:'elektronik',et_tablet:'elektronik',et_console:'elektronik',et_charger:'elektronik',
      et_furniture:'ev',et_lamp:'ev',et_carpet:'ev',et_curtain:'ev',et_kitchen:'ev',et_bath:'ev',et_garden:'ev',et_decor:'ev',
      et_skincare:'kozmetik',et_makeup:'kozmetik',et_perfume:'kozmetik',et_hair:'kozmetik',et_nail:'kozmetik',et_cream:'kozmetik',
      et_food:'gida',et_drink:'icecek',et_snack:'gida',et_organic:'gida',et_supplement:'gida',et_package:'gida',
      et_sportgear:'spor',et_sportshoe:'spor',et_camp:'spor',et_bike:'spor',et_swim:'spor',et_yoga:'spor',

document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendMessage()}});

// ── HELPERS ──
function deduct(catId) {
  if (isTrialActive() && !getOwned().includes(catId)) {
    trialCredits--; localStorage.setItem('fenix_trial_credits',trialCredits);
  } else {
    credits--; localStorage.setItem('fenix_otonom_credits',credits);
    // Backend'de de kredi düşür (Firestore senkron)
    if (cardToken) {
      fetch(`${API}/api/card/use-credit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:cardToken,category:catId})})
        .then(r=>r.json()).then(d=>{ if(d.ok){credits=d.credits;localStorage.setItem('fenix_otonom_credits',credits);renderCredits()} })
        .catch(()=>{});
    }
  }
}
function updJob(id, u) {
  const prev = jobs.find(j=>j.id===id);
  jobs = jobs.map(j=>j.id===id?{...j,...u}:j);
  saveJobs();
  if (u.status==='done' && prev?.status!=='done') sendNotif(prev?.catId||'', prev?.name||'');
  render();
}
function saveJobs() { localStorage.setItem('fenix_jobs', JSON.stringify(jobs.slice(0,50))); }
function fmtTime(ms) { const s=Math.floor(ms/1000); return s<60?s+'sn':s<3600?Math.floor(s/60)+'dk':Math.floor(s/3600)+'sa'; }
function showToast(msg,type) {
  const t=document.createElement('div');t.className='toast '+(type||'ok');t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2000);
}

// ── POLLING ──
setInterval(async()=>{
  const act=jobs.filter(j=>j.status==='processing'||j.status==='queued');
  if(!act.length) return;
  for(const job of act){
    try{
      let url;
      if(job.catId==='360') url=`${API}/api/pro/stitch/status/${job.id}`;
      else if(job.catId==='dublaj') url=`${API}/api/dubbing/status/${job.id}`;
      else if(job.catId==='otonom') url=`${API}/api/pipeline/status/${job.id}`;
      else if(job.catId==='eticaret') url=`${API}/api/pipeline/status/${job.id}`;
      else url=`${API}/api/pro/render-progress/${job.id}`;
      const r=await fetch(url);if(!r.ok) continue;
      const d=await r.json();
      updJob(job.id,{status:d.status,progress:d.progress??job.progress,url:d.downloadUrl||d.outputUrl,error:d.error});
    }catch(e){}
  }
},3000);
