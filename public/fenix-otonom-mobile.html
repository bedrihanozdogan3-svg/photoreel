<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>Fenix Otonom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0A0A0A; --surface:#111; --border:#1a1a1a; --border2:#222;
  --text:#fff; --text2:#ccc; --text3:#888; --text4:#555; --text5:#333;
  --orange:#F97316; --orange2:#EA580C; --blue:#3B82F6; --purple:#8B5CF6;
  --green:#10B981; --yellow:#EAB308; --red:#EF4444; --master-green:#22C55E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  height:100dvh;display:flex;flex-direction:column;
  max-width:100%;margin:0 auto;
  user-select:none;-webkit-user-select:none;overflow:hidden;
}

/* ── HEADER ── */
.header{
  padding:env(safe-area-inset-top,12px) 16px 8px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.h-left{display:flex;align-items:center;gap:8px}
.h-logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(249,115,22,0.3)}
.h-title{font-weight:900;font-size:13px;letter-spacing:2px}
.h-sub{font-size:7px;color:var(--text4);letter-spacing:1.5px;margin-top:1px}
.h-right{display:flex;align-items:center;gap:6px}
.h-credit{background:#151515;border:1px solid var(--border2);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:4px;font-size:13px;font-weight:900;color:var(--orange)}
.h-credit.low{color:var(--red);border-color:#7F1D1D44;background:#1a0000}

/* ── CATEGORIES TAB ── */
.cat-tabs{
  display:flex;gap:0;overflow-x:auto;flex-shrink:0;
  border-bottom:1px solid var(--border);
  scrollbar-width:none;-ms-overflow-style:none;
}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  flex:1 0 auto;padding:8px 14px;font-size:10px;font-weight:700;
  color:var(--text4);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .2s;
  letter-spacing:0.5px;text-align:center;
}
.cat-tab.active{color:var(--text);border-bottom-color:var(--orange)}
.cat-tab .tab-icon{font-size:14px;display:block;text-align:center;margin-bottom:2px}

/* ── SHORTCUTS GRID ── */
.shortcuts{
  flex:1 1 auto;overflow-x:hidden;overflow-y:auto;
  padding:8px;
  -webkit-overflow-scrolling:touch;
}
.sc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}
.sc-btn{
  background:#0c0c0c;border:1px solid #161616;border-radius:10px;
  padding:10px 4px 8px;text-align:center;cursor:pointer;transition:all .12s;
}
.sc-btn:active{transform:scale(0.93);background:#1a1a1a}
.sc-btn .sc-i{font-size:22px;display:block;line-height:1}
.sc-btn .sc-l{font-size:8px;font-weight:600;color:#999;margin-top:4px;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-btn.locked{opacity:0.25;cursor:default}
.sc-btn.locked .sc-i{filter:grayscale(1)}

/* ── ACTIVE JOBS (inline, compact) ── */
.jobs-area{
  flex-shrink:0;overflow-y:auto;max-height:30vh;
  padding:4px 8px;
}

/* ═══ TABLET (600px+) ═══ */
@media (min-width:600px) {
  .header{padding:env(safe-area-inset-top,14px) 24px 10px}
  .h-logo{width:34px;height:34px;font-size:17px;border-radius:9px}
  .h-title{font-size:16px;letter-spacing:3px}
  .h-sub{font-size:8px}
  .h-credit{font-size:15px;padding:5px 14px}
  .cat-tab{padding:10px 20px;font-size:12px}
  .cat-tab .tab-icon{font-size:18px;margin-bottom:3px}
  .shortcuts{padding:12px}
  .sc-grid{grid-template-columns:repeat(5,1fr);gap:8px}
  .sc-btn{padding:14px 6px 10px;border-radius:12px}
  .sc-btn .sc-i{font-size:28px}
  .sc-btn .sc-l{font-size:10px;margin-top:5px}
  .jobs-area{padding:6px 12px}
  .job-row{padding:10px 14px;border-radius:14px;gap:10px}
  .job-icon{font-size:22px}
  .job-name{font-size:12px}
  .job-meta{font-size:9px}
  .job-status{font-size:9px;padding:3px 8px}
  .job-dl{font-size:10px;padding:5px 14px}
  .msg-area{padding:8px 12px env(safe-area-inset-bottom,10px)}
  .msg-input{font-size:15px;padding:12px 18px}
  .msg-send{width:44px;height:44px;font-size:18px}
  .msg-file{width:44px;height:44px;font-size:20px}
}

/* ═══ LARGE TABLET (900px+) ═══ */
@media (min-width:900px) {
  .header{padding:16px 32px 12px}
  .h-logo{width:40px;height:40px;font-size:20px;border-radius:10px}
  .h-title{font-size:18px}
  .cat-tab{padding:12px 28px;font-size:13px}
  .cat-tab .tab-icon{font-size:20px}
  .shortcuts{padding:16px 20px}
  .sc-grid{grid-template-columns:repeat(6,1fr);gap:10px}
  .sc-btn{padding:16px 8px 12px;border-radius:14px}
  .sc-btn .sc-i{font-size:32px}
  .sc-btn .sc-l{font-size:11px;margin-top:6px}
  .jobs-area{padding:8px 20px}
  .job-row{padding:12px 18px}
  .msg-area{padding:10px 20px env(safe-area-inset-bottom,12px)}
  .msg-input{font-size:16px;padding:14px 20px;border-radius:24px}
  .msg-send{width:48px;height:48px;font-size:20px}
  .msg-file{width:48px;height:48px;font-size:22px}
}

/* ═══ LANDSCAPE ═══ */
@media (orientation:landscape) and (max-height:500px) {
  .shortcuts{max-height:50vh}
  .sc-grid{grid-template-columns:repeat(6,1fr);gap:4px}
  .sc-btn{padding:6px 2px 4px}
  .sc-btn .sc-i{font-size:18px}
  .sc-btn .sc-l{font-size:7px;margin-top:2px}
  .cat-tab{padding:6px 12px;font-size:9px}
  .cat-tab .tab-icon{font-size:12px;margin-bottom:1px}
  .header{padding:4px 12px}
  .jobs-area{max-height:20vh}
}
.job-row{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:8px 10px;margin-bottom:4px;
}
.job-row.done{border-color:rgba(34,197,94,0.2)}
.job-icon{font-size:18px;flex-shrink:0}
.job-info{flex:1;min-width:0}
.job-name{font-size:10px;font-weight:700;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.job-meta{font-size:8px;color:var(--text4);margin-top:1px}
.job-bar{height:3px;background:#1a1a1a;border-radius:3px;margin-top:4px;overflow:hidden}
.job-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.job-status{font-size:8px;font-weight:900;padding:2px 6px;border-radius:12px;flex-shrink:0}
.job-status.pending{background:rgba(26,26,0,0.6);color:var(--yellow)}
.job-status.done{background:rgba(5,46,22,0.6);color:var(--master-green)}
.job-status.error{background:rgba(45,10,10,0.6);color:var(--red)}
.job-dl{
  background:linear-gradient(135deg,var(--green),#059669);
  border-radius:8px;padding:4px 10px;font-size:8px;font-weight:900;
  color:#000;text-decoration:none;flex-shrink:0;
}

/* ── MESSAGE INPUT ── */
.msg-area{
  margin-top:auto;flex-shrink:0;
  padding:6px 8px env(safe-area-inset-bottom,8px);
  background:var(--surface);border-top:1px solid var(--border);
}
.msg-row{display:flex;gap:6px;align-items:center}
.msg-input{
  flex:1;background:#0a0a0a;border:1px solid var(--border2);
  border-radius:20px;padding:10px 14px;color:var(--text);
  font-size:13px;font-family:inherit;outline:none;
  transition:border-color .2s;
}
.msg-input:focus{border-color:var(--orange)}
.msg-input::placeholder{color:var(--text5)}
.msg-send{
  width:38px;height:38px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#000;font-size:16px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(249,115,22,0.3);
}
.msg-send:active{transform:scale(0.9)}
.msg-file{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);
  background:transparent;color:var(--text3);font-size:18px;cursor:pointer;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.msg-file:active{background:#1a1a1a}

/* ── TOAST ── */
.toast{
  position:fixed;top:env(safe-area-inset-top,16px);left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:12px;font-size:11px;font-weight:700;
  z-index:999;animation:fadeDown .3s ease;max-width:90%;text-align:center;
}
.toast.ok{background:linear-gradient(135deg,#052e16,#0a1a0a);color:var(--master-green);border:1px solid #16653433}
.toast.error{background:linear-gradient(135deg,#2d0a0a,#1a0000);color:var(--red);border:1px solid #7F1D1D33}
@keyframes fadeDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── LOADING ── */
.loading-screen{
  height:100dvh;background:var(--bg);display:flex;align-items:center;justify-content:center;
  position:fixed;inset:0;z-index:100;transition:opacity .4s;
}
.loading-screen.hide{opacity:0;pointer-events:none}
.ld-ring{width:50px;height:50px;margin:0 auto 12px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,0.25),rgba(249,115,22,0.06));border:2px solid rgba(249,115,22,0.2);display:flex;align-items:center;justify-content:center;font-size:24px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}

#fileInput{display:none}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div style="text-align:center">
    <div class="ld-ring">🔥</div>
    <div style="font-size:16px;font-weight:800;color:var(--orange);letter-spacing:3px">FENIX</div>
    <div style="font-size:9px;color:var(--text4);margin-top:4px;letter-spacing:1px">OTONOM PANEL</div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="h-left">
    <div class="h-logo">🔥</div>

  </div>
  <div class="h-right">

  </div>
</div>

<!-- CATEGORY TABS -->
<div class="cat-tabs" id="catTabs"></div>

<!-- SHORTCUTS -->

<!-- ACTIVE JOBS -->
<div class="jobs-area" id="jobsArea"></div>

<!-- MESSAGE INPUT -->
<div class="msg-area">
  <div class="msg-row">
    <button class="msg-file" id="fileBtn" onclick="pickFile()">📎</button>
    <input class="msg-input" id="msgInput" placeholder="Fenix'e komut yaz..." autocomplete="off">
    <button class="msg-send" onclick="sendMessage()">➤</button>
  </div>
</div>

<input type="file" id="fileInput">

    ]

// ════════════════════════════════════════
//  NOTIFICATION LABELS
// ════════════════════════════════════════
const NOTIF_LABELS = {
  pro:'Videon hazir! 🎬',
  '360':'360° videon hazir! 🌐',
  dublaj:'Dublajin hazir! 🎙️',
  eticaret:'Urunun hazir! 🛍️',
  otonom:'Islemin tamamlandi! 🤖',
};

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let plan = localStorage.getItem('fenix_plan') || 'free';
let credits = parseInt(localStorage.getItem('fenix_otonom_credits') || '15');
let trialCredits = parseInt(localStorage.getItem('fenix_trial_credits') ?? TRIAL_MAX);
let jobs = JSON.parse(localStorage.getItem('fenix_jobs') || '[]');
let activeCatId = 'pro';
let activeUploadCmd = null;

// ════════════════════════════════════════
//  CARD LOGIC
// ════════════════════════════════════════
function getOwnedCards() {
  if (plan === 'master' || plan === 'otonom') return ALL_IDS;
  if (plan === 'pro') return ['pro'];
  if (plan === '360') return ['360'];
  if (plan === 'dublaj') return ['dublaj'];
  if (plan === 'eticaret') return ['eticaret'];
  return [];
}
function getActiveCards() {
  if (plan === 'master' || plan === 'otonom') return ALL_IDS;
  if (trialCredits > 0) return ALL_IDS;
  return getOwnedCards();
}
function isMaster() { return plan === 'master' || plan === 'otonom'; }
function isTrialActive() { return trialCredits > 0 && !isMaster(); }

// ════════════════════════════════════════
//  PUSH NOTIFICATION
// ════════════════════════════════════════
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function sendNotification(catId, fileName) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const title = NOTIF_LABELS[catId] || 'Islemin hazir!';
  const body = fileName ? fileName : 'Fenix islemi tamamladi.';
  try {
    new Notification(title, {
      body: body,
      icon: '/fenix-icon-192.png',
      badge: '/fenix-icon-192.png',
      tag: 'fenix-job-done',
      vibrate: [200, 100, 200],
    });
  } catch(e) {
    // SW fallback
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification(title, { body, icon: '/fenix-icon-192.png', badge: '/fenix-icon-192.png', tag: 'fenix-job-done', vibrate: [200, 100, 200] });
      });
    }
  }
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
(async function init() {
  // QR token
  const params = new URLSearchParams(window.location.search);
  const token = params.get('t');
  if (token && token.length >= 8) {
    try {
      const res = await fetch(`${API}/api/card/${token}`);
      if (res.ok) {
        const data = await res.json();
        plan = data.plan || 'free';
        credits = data.credits || 15;
        localStorage.setItem('fenix_plan', plan);
        localStorage.setItem('fenix_otonom_credits', credits);
      }
    } catch(e) {}
  }
  if (localStorage.getItem('fenix_trial_credits') === null && plan !== 'free') {
    trialCredits = TRIAL_MAX;
    localStorage.setItem('fenix_trial_credits', trialCredits);
  }
  // Clear old format
  try {
    const old = JSON.parse(localStorage.getItem('fenix_jobs') || '[]');
    if (old.length > 0 && old[0].shortcutId) { localStorage.removeItem('fenix_jobs'); jobs = []; }
  } catch(e) { localStorage.removeItem('fenix_jobs'); jobs = []; }

  // Request notification permission
  requestNotifPermission();

  // Hide loading
  setTimeout(() => {
    const ls = document.getElementById('loadingScreen');
    if (ls) { ls.classList.add('hide'); setTimeout(() => ls.remove(), 400); }
  }, 500);

  try { render(); } catch(e) {
    document.getElementById('shortcutsArea').innerHTML = '<div style="padding:16px;color:var(--orange);font-size:12px">Hata: '+e.message+'</div>';
  }
})();

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function render() {
  try {
    renderCredits();
    renderTabs();
    renderShortcuts();
    renderJobs();
  } catch(e) {
    console.error('Render:', e);
  }
}

function renderCredits() {
  const el = document.getElementById('creditNum');
  const badge = document.getElementById('creditBadge');
  el.textContent = credits;
  badge.className = 'h-credit' + (credits <= 3 ? ' low' : '');
}

function renderTabs() {
  const container = document.getElementById('catTabs');
  const active = getActiveCards();
  container.innerHTML = CATEGORIES.map(cat => {
    const unlocked = active.includes(cat.id);
    return `<div class="cat-tab ${activeCatId === cat.id ? 'active' : ''} ${unlocked ? '' : ''}" onclick="${unlocked ? `switchCat('${cat.id}')` : `showToast('${cat.id.toUpperCase()} karti gerekli','error')`}" style="${!unlocked ? 'opacity:0.3' : ''}">
      <span class="tab-icon">${cat.icon}</span>${cat.label}
    </div>`;
  }).join('');
}

function renderShortcuts() {
  const cat = CATEGORIES.find(c => c.id === activeCatId);
  const active = getActiveCards();
  const unlocked = active.includes(cat.id);
  const container = document.getElementById('shortcutsArea');

  if (!unlocked) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text5);font-size:11px">🔒 Bu kategori icin kart gerekli</div>';
    return;
  }

  container.innerHTML = '<div class="sc-grid">' + cat.commands.map(cmd =>
    `<div class="sc-btn" onclick="tapCommand('${cat.id}','${cmd.id}')">
      <span class="sc-i">${cmd.icon}</span>
      <div class="sc-l">${cmd.label}</div>
    </div>`
  ).join('') + '</div>';
}

function renderJobs() {
  const container = document.getElementById('jobsArea');
  const activeJobs = jobs.filter(j => ['processing','queued','uploading'].includes(j.status));
  const doneJobs = jobs.filter(j => j.status === 'done' || j.status === 'error').slice(0, 3);
  const show = [...activeJobs, ...doneJobs];

  if (show.length === 0) { container.innerHTML = ''; return; }

  container.innerHTML = show.map(job => {
    const cat = CATEGORIES.find(c => c.id === job.categoryId) || CATEGORIES[0];
    const cmd = cat.commands.find(c => c.id === job.commandId) || cat.commands[0];
    const isActive = ['processing','queued','uploading'].includes(job.status);
    const statusText = job.status === 'done' ? 'HAZIR' : job.status === 'error' ? 'HATA' : job.status === 'uploading' ? 'YUKLUYOR' : job.status === 'queued' ? 'SIRADA' : '%'+job.progress;
    const statusCls = job.status === 'done' ? 'done' : job.status === 'error' ? 'error' : 'pending';

    return `<div class="job-row ${job.status === 'done' ? 'done' : ''}">
      <span class="job-icon">${cmd.icon}</span>
      <div class="job-info">
        <div class="job-name">${job.fileName || cmd.label}</div>
        <div class="job-meta">${cat.label} · ${formatTime(Date.now() - job.startedAt)}</div>
        ${isActive ? `<div class="job-bar"><div class="job-bar-fill" style="background:${cat.gradient};width:${job.status==='uploading'?10:job.status==='queued'?5:job.progress}%"></div></div>` : ''}
      </div>
      <span class="job-status ${statusCls}">${statusText}</span>
      ${job.status === 'done' && job.outputUrl ? `<a href="${job.outputUrl}" download class="job-dl">INDIR</a>` : ''}
    </div>`;
  }).join('');
}

// ════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════
function switchCat(id) {
  activeCatId = id;
  render();
}

function tapCommand(catId, cmdId) {
  if (credits <= 0) { showToast('Kredi tukendi!', 'error'); return; }
  const cat = CATEGORIES.find(c => c.id === catId);
  const cmd = cat.commands.find(c => c.id === cmdId);

  if (cmd.type === 'file') {
    activeUploadCmd = { catId, cmdId, accept: cmd.accept, endpoint: cmd.endpoint, field: cmd.field };
    const input = document.getElementById('fileInput');
    input.accept = cmd.accept;
    input.click();
  } else {
    executeAction(catId, cmdId, cmd.endpoint);
  }
}

function pickFile() {
  // Generic file pick — uses active category's first file command
  const cat = CATEGORIES.find(c => c.id === activeCatId);
  const cmd = cat.commands.find(c => c.type === 'file');
  if (cmd) tapCommand(cat.id, cmd.id);
  else showToast('Dosya gerektiren komut yok', 'error');
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  // AI command via message
  const jobId = crypto.randomUUID();
  jobs.unshift({ id: jobId, categoryId: activeCatId, commandId: 'msg', fileName: null, status: 'queued', progress: 0, startedAt: Date.now(), message: msg });
  saveJobs();
  render();

  fetch(`${API}/api/otonom/command`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ plan, command: msg, category: activeCatId })
  }).then(r => r.json()).then(data => {
    updateJob(jobId, { id: data.jobId || jobId, status: data.status === 'done' ? 'done' : 'processing', progress: data.progress || 0, outputUrl: data.downloadUrl });
    if (data.status === 'done') sendNotification(activeCatId, msg);
    deductCredit(activeCatId);
  }).catch(err => {
    updateJob(jobId, { status: 'error', error: err.message || 'Hata' });
  });

  showToast('Komut gonderildi', 'ok');
}

async function executeAction(catId, cmdId, endpoint) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const cmd = cat.commands.find(c => c.id === cmdId);
  const jobId = crypto.randomUUID();

  jobs.unshift({ id: jobId, categoryId: catId, commandId: cmdId, fileName: null, status: 'queued', progress: 0, startedAt: Date.now() });
  saveJobs();
  render();

  try {
    const res = await fetch(`${API}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan, action: cmdId })
    });
    if (!res.ok) throw new Error('Basarisiz');
    const data = await res.json();
    updateJob(jobId, { id: data.jobId || jobId, status: data.status === 'done' ? 'done' : 'processing', progress: data.progress || 0, outputUrl: data.downloadUrl });
    if (data.status === 'done') sendNotification(catId, cmd.label);
    deductCredit(catId);
    showToast('Kuyruga alindi', 'ok');
  } catch(err) {
    updateJob(jobId, { status: 'error', error: err.message });
    showToast(err.message, 'error');
  }
  render();
}

document.getElementById('fileInput').addEventListener('change', async function(e) {
  const file = e.target.files?.[0];
  if (!file || !activeUploadCmd) return;

  const { catId, cmdId, endpoint, field } = activeUploadCmd;
  const cat = CATEGORIES.find(c => c.id === catId);
  const jobId = crypto.randomUUID();

  jobs.unshift({ id: jobId, categoryId: catId, commandId: cmdId, fileName: file.name, status: 'uploading', progress: 0, startedAt: Date.now() });
  saveJobs();
  render();

  try {
    const fd = new FormData();
    fd.append(field, file, file.name);

    const directEP = ['/api/pro/stitch','/api/pro/remove-bg','/api/pro/panorama','/api/pro/product-photo','/api/pro/catalog','/api/pro/product-spin','/api/pro/mockup','/api/pro/watermark','/api/pro/enhance','/api/pro/multi-angle','/api/pro/banner','/api/pro/change-product-bg'];
    if (directEP.includes(endpoint)) {
      const res = await fetch(`${API}${endpoint}`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error('Basarisiz');
      const data = await res.json();
      updateJob(jobId, { id: data.jobId||data.id||jobId, status: data.downloadUrl ? 'done' : 'queued', progress: data.downloadUrl ? 100 : 0, outputUrl: data.downloadUrl });
      if (data.downloadUrl) sendNotification(catId, file.name);
    } else {
      const upRes = await fetch(`${API}/api/pro/upload`, { method: 'POST', body: fd });
      if (!upRes.ok) throw new Error('Yukleme basarisiz');
      const { fileId } = await upRes.json();
      const body = { fileId, action: cmdId };
      if (catId === 'dublaj') { body.targetLang = 'tr'; body.sourceLang = 'tr'; }
      const jobRes = await fetch(`${API}${endpoint}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!jobRes.ok) throw new Error('Basarisiz');
      const jobData = await jobRes.json();
      updateJob(jobId, { id: jobData.jobId||jobData.id||jobId, status: 'queued', progress: 0 });
    }
    deductCredit(catId);
    showToast('Kuyruga alindi', 'ok');
  } catch(err) {
    updateJob(jobId, { status: 'error', error: err.message });
    showToast(err.message, 'error');
  }

  activeUploadCmd = null;
  this.value = '';
  render();
});

// Enter key
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
});

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function deductCredit(catId) {
  const owned = getOwnedCards();
  if (isTrialActive() && !owned.includes(catId)) {
    trialCredits--;
    localStorage.setItem('fenix_trial_credits', trialCredits);
  } else {
    credits--;
    localStorage.setItem('fenix_otonom_credits', credits);
  }
}

function updateJob(id, updates) {
  const prev = jobs.find(j => j.id === id);
  jobs = jobs.map(j => j.id === id ? { ...j, ...updates } : j);
  saveJobs();
  // Send notification if just became done
  if (updates.status === 'done' && prev && prev.status !== 'done') {
    sendNotification(prev.categoryId, prev.fileName || '');
  }
  render();
}

function saveJobs() {
  localStorage.setItem('fenix_jobs', JSON.stringify(jobs.slice(0, 50)));
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 'sn';
  if (s < 3600) return Math.floor(s/60) + 'dk';
  return Math.floor(s/3600) + 'sa';
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || 'ok');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2000);
}

// ════════════════════════════════════════
//  POLLING
// ════════════════════════════════════════
setInterval(async () => {
  const active = jobs.filter(j => j.status === 'processing' || j.status === 'queued');
  if (!active.length) return;
  for (const job of active) {
    try {
      let url;
      if (job.categoryId === '360') url = `${API}/api/pro/stitch/status/${job.id}`;
      else if (job.categoryId === 'dublaj') url = `${API}/api/dubbing/status/${job.id}`;
      else if (job.categoryId === 'otonom') url = `${API}/api/otonom/status/${job.id}`;
      else url = `${API}/api/pro/render-progress/${job.id}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const d = await res.json();
      updateJob(job.id, { status: d.status, progress: d.progress ?? job.progress, outputUrl: d.downloadUrl || d.outputUrl, error: d.error });
    } catch(e) {}
  }
}, 3000);
</script>
